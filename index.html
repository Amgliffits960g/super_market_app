        <div class="field-row"><label>Store Address / Location</label><input type="text" id="setStoreAddress" value="${escapeHtml(SETTINGS.storeAddress)}" placeholder="e.g. Bantama, Kumasi"></div>
        <div class="field-row"><label>Currency Code</label><input type="text" id="setCurrency" value="${escapeHtml(SETTINGS.currency)}" maxlength="6"></div>
        <div class="field-row"><label>Low Stock Threshold</label><input type="number" id="setLowStock" min="0" value="${SETTINGS.lowStockThreshold}"></div>
        <div class="field-row"><label>Receipt Footer Message</label><input type="text" id="setFooter" value="${escapeHtml(SETTINGS.receiptFooter)}"></div>
        <button class="btn btn-primary" id="saveStoreSettings">Save Changes</button>
      </div>

      <div class="card" style="padding:20px;">
        <h3 style="font-family:var(--font-display);font-size:15px;margin-bottom:6px;">📞 Contact Numbers</h3>
        <p class="text-muted" style="font-size:12px;margin-bottom:12px;">These show on every printed/shared receipt. Add as many as you need.</p>
        <div id="contactsList"></div>
        <button class="btn btn-outline btn-sm mt-8" id="addContactBtn">+ Add Contact Number</button>
        <div class="divider"></div>
        <button class="btn btn-primary" id="saveContactsBtn">Save Contacts</button>
      </div>

      <div class="card" style="padding:20px;">
        <h3 style="font-family:var(--font-display);font-size:15px;margin-bottom:6px;">🧑‍💼 Cashiers / Staff</h3>
        <p class="text-muted" style="font-size:12px;margin-bottom:12px;">Add each person who serves customers. Their name is picked at checkout and shown on the receipt as "Served by".</p>
        <div id="cashiersList"></div>
        <button class="btn btn-outline btn-sm mt-8" id="addCashierBtn">+ Add Cashier</button>
        <div class="divider"></div>
        <button class="btn btn-primary" id="saveCashiersBtn">Save Cashiers</button>
      </div>

      <div class="card" style="padding:20px;">
        <h3 style="font-family:var(--font-display);font-size:15px;margin-bottom:14px;">🖨 Printer</h3>
        <div class="field-row">
          <label>Receipt Printer Type</label>
          <select id="setPrinterType">
            <option value="standard" ${SETTINGS.printerType==='standard'?'selected':''}>Standard / A4 Printer</option>
            <option value="thermal58" ${SETTINGS.printerType==='thermal58'?'selected':''}>Thermal Printer — 58mm</option>
            <option value="thermal80" ${SETTINGS.printerType==='thermal80'?'selected':''}>Thermal Printer — 80mm (e.g. XP-T80A)</option>
          </select>
        </div>
        <p class="text-muted" style="font-size:12px;margin-bottom:12px;">If a thermal receipt still prints a long blank tail with the browser dialog below, it's the Windows printer driver's paper-size setting — open the XP-T80A's printer Properties → Preferences → Paper Size, and choose its "Roll/Receipt 80mm (auto/continuous)" option instead of a fixed page size like A4.</p>
        <div class="divider"></div>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;margin-bottom:10px;">
          <input type="checkbox" id="setDirectPrint" ${SETTINGS.directPrintEnabled?'checked':''}> Print directly to USB/Serial (skips the print window, cuts automatically)
        </label>
        <p class="text-muted" style="font-size:12px;margin-bottom:12px;">${directPrintSupported() ? 'Supported in this browser. The first connection asks you to pick the printer once — after that, printing sends straight to the printer with no dialog.' : 'Not available in this browser/window — direct printing needs Chrome or Edge on a desktop computer, opened over https or localhost (not a plain local file). The app will keep using the print dialog above until then.'}</p>
        <div class="field-row"><label>Baud Rate</label><input type="number" id="setBaudRate" value="${SETTINGS.printerBaudRate}" min="1200"></div>
        <div class="flex gap-8" style="flex-wrap:wrap;">
          <button class="btn btn-outline btn-sm" id="connectPrinterBtn" ${directPrintSupported()?'':'disabled'}>Connect Printer</button>
          <button class="btn btn-outline btn-sm" id="testPrinterBtn" ${directPrintSupported()?'':'disabled'}>Print Test Slip</button>
        </div>
        <div class="divider"></div>
        <button class="btn btn-primary" id="savePrinterSettings">Save Printer Settings</button>
      </div>

      <div class="card" style="padding:20px;">
        <h3 style="font-family:var(--font-display);font-size:15px;margin-bottom:14px;">💬 Messaging Templates</h3>
        <div class="field-row"><label>WhatsApp Receipt Message</label><textarea id="setWaTpl" rows="2">${escapeHtml(SETTINGS.whatsappTemplate)}</textarea></div>
        <div class="field-row"><label>SMS Receipt Message</label><textarea id="setSmsTpl" rows="2">${escapeHtml(SETTINGS.smsTemplate)}</textarea></div>
        <div class="msg-tpl-vars mb-16">Variables: <b>{name}</b> <b>{store}</b> <b>{receiptId}</b> <b>{total}</b></div>
        <button class="btn btn-primary" id="saveMsgTemplates">Save Templates</button>
      </div>

      <div class="card" style="padding:20px;grid-column:1/-1;">
        <h3 style="font-family:var(--font-display);font-size:15px;margin-bottom:6px;">🎨 Advanced — Themes</h3>
        <div class="card" style="padding:20px;">
        <h3 style="font-family:var(--font-display);font-size:15px;margin-bottom:6px;">👁️ Menu Visibility</h3>
        <p class="text-muted" style="font-size:12px;margin-bottom:14px;">Hide menu items or the price field from cashiers. Uncheck to hide, check to show.</p>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;margin-bottom:10px;">
          <input type="checkbox" id="mvCustomers" ${(SETTINGS.menuVisibility||DEFAULT_SETTINGS.menuVisibility).customers?'checked':''}> Show "Customers" menu
        </label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;margin-bottom:10px;">
          <input type="checkbox" id="mvMedia" ${(SETTINGS.menuVisibility||DEFAULT_SETTINGS.menuVisibility).media?'checked':''}> Show "Media" menu
        </label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;margin-bottom:10px;">
          <input type="checkbox" id="mvProducts" ${(SETTINGS.menuVisibility||DEFAULT_SETTINGS.menuVisibility).products?'checked':''}> Show "Products" menu
        </label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;margin-bottom:14px;">
          <input type="checkbox" id="mvPriceEdit" ${(SETTINGS.menuVisibility||DEFAULT_SETTINGS.menuVisibility).priceEdit?'checked':''}> Allow changing product price
        </label>
        <button class="btn btn-primary" id="saveMenuVisibility">Save Menu Visibility</button>
      </div>

      <div class="card" style="padding:20px;grid-column:1/-1;">
        <h3 style="font-family:var(--font-display);font-size:15px;margin-bottom:6px;">🎨 Advanced — Themes</h3>
        <p class="text-muted" style="font-size:12px;margin-bottom:14px;">Beyond the quick light/dark toggle in the topbar, pick from a few extra color palettes — some darker, some lighter.</p>
        <div class="flex gap-8" style="flex-wrap:wrap;" id="themeSwatches"></div>
      </div>

      <div class="card" style="padding:20px;grid-column:1/-1;">
        <h3 style="font-family:var(--font-display);font-size:15px;margin-bottom:6px;">🔍 Advanced — Display Zoom</h3>
        <p class="text-muted" style="font-size:12px;margin-bottom:16px;">Scale the whole app up or down to fit your screen — handy on laptops with smaller or higher-resolution displays. This is remembered and applied automatically every time the app opens, until you change it again.</p>
        <div class="flex items-center gap-12" style="flex-wrap:wrap;">
          <input type="range" id="zoomSlider" min="50" max="150" step="5"
                 value="${SETTINGS.appZoom || 100}"
                 style="flex:1;min-width:220px;accent-color:var(--orange);">
          <div class="flex items-center gap-8">
            <input type="number" id="zoomNumber" min="50" max="150" step="5"
                   value="${SETTINGS.appZoom || 100}"
                   style="width:70px;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;text-align:center;background:var(--card);color:var(--text);font-weight:700;">
            <span style="font-weight:700;font-size:13px;color:var(--muted);">%</span>
          </div>
          <button class="btn btn-outline btn-sm" id="zoomResetBtn">Reset to 100%</button>
        </div>
      </div>

      <div class="card" style="padding:20px;grid-column:1/-1;">
        <h3 style="font-family:var(--font-display);font-size:15px;margin-bottom:6px;">🔐 Security — Separate Passwords</h3>
        <p class="text-muted" style="font-size:12px;margin-bottom:14px;">Each action below can use its own password. All start the same until you change them — set different ones so, for example, a cashier can log in and message customers but can't delete records or change prices.</p>
        <div class="form-grid" style="grid-template-columns:repeat(4,1fr);">
          ${['admin|App Login','delete|Delete Actions','price|Price Changes','message|Customer Messaging'].map(pair=>{
            const [key,label] = pair.split('|');
            const field = key+'Password';
            return `
            <div>
              <h4 style="font-size:13px;margin-bottom:8px;">${label}</h4>
              <div class="field-row"><label>Current</label><input type="password" id="cur_${field}" placeholder="••••••••" autocomplete="new-password"></div>
              <div class="field-row"><label>New</label><input type="password" id="new_${field}" placeholder="••••••••" autocomplete="new-password"></div>
              <div class="field-row"><label>Confirm</label><input type="password" id="conf_${field}" placeholder="••••••••" autocomplete="new-password"></div>
              <button class="btn btn-dark btn-sm w-full" data-pwfield="${field}">Update</button>
            </div>`;
          }).join('')}
        </div>
      </div>

      <div class="card" style="padding:20px;grid-column:1/-1;">
        <h3 style="font-family:var(--font-display);font-size:15px;margin-bottom:6px;">☁️ Cloud Sync (Supabase)</h3>
        <p class="text-muted" style="font-size:12px;margin-bottom:14px;">Keep this device's data backed up and shared with other devices/counters. The app always works fully offline — sync just quietly catches up whenever you're online.</p>
        <div class="form-grid">
          <div class="field-row"><label>Supabase Project URL</label><input type="text" id="setSyncUrl" value="${escapeHtml(SYNC.url)}" placeholder="https://xxxx.supabase.co"></div>
          <div class="field-row"><label>Supabase Anon Public Key</label><input type="text" id="setSyncKey" value="${escapeHtml(SYNC.anonKey)}" placeholder="ey..."></div>
          <div class="field-row"><label>Products Table Name</label><input type="text" id="setSyncProductsTable" value="${escapeHtml(SYNC.productsTable)}"></div>
          <div class="field-row"><label>Sales Table Name</label><input type="text" id="setSyncSalesTable" value="${escapeHtml(SYNC.salesTable)}"></div>
          <div class="field-row"><label>Customers Table Name</label><input type="text" id="setSyncCustomersTable" value="${escapeHtml(SYNC.customersTable)}"></div>
          <div class="field-row">
            <label>Auto-sync Every (seconds)</label>
            <input type="number" id="setSyncInterval" min="20" value="${SYNC.syncIntervalSec}">
          </div>
        </div>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;margin-bottom:14px;">
          <input type="checkbox" id="setSyncAuto" ${SYNC.autoSync?'checked':''}> Enable automatic background sync
        </label>
        <div class="flex gap-8" style="flex-wrap:wrap;margin-bottom:14px;">
          <button class="btn btn-primary btn-sm" id="saveSyncSettingsBtn">Save Sync Settings</button>
          <button class="btn btn-outline btn-sm" id="syncNowBtn">Sync Now</button>
        </div>
        <div class="flex items-center" style="margin-bottom:10px;">
          <span class="sync-status-dot" id="syncStatusDot"></span>
          <span id="syncStatusText" class="text-muted" style="font-size:12.5px;">${SYNC.lastSync ? 'Last synced ' + fmtDate(SYNC.lastSync) : 'Not synced yet'}</span>
        </div>
        <div class="divider"></div>
        <h4 style="font-size:13px;margin-bottom:8px;">Recent Sync Activity</h4>
        <div class="history-list" id="syncHistoryList"></div>
      </div>

      <div class="card" style="padding:20px;grid-column:1/-1;">
        <h3 style="font-family:var(--font-display);font-size:15px;margin-bottom:6px;">💾 Data &amp; Backup</h3>
        <p class="text-muted" style="font-size:12.5px;margin-bottom:14px;">Move your whole store — products (with pictures), stock, prices, sales history, customers and settings — to a new machine, or keep a safe backup.</p>
        <div class="flex gap-8" style="flex-wrap:wrap;margin-bottom:14px;">
          <button class="btn btn-primary btn-sm" id="exportFullJsonBtn">${ICONS.download} Export Full Backup (JSON)</button>
          <button class="btn btn-dark btn-sm" id="importFullJsonBtn">${ICONS.upload} Import Full Backup (JSON)</button>
          <input type="file" id="importFullJsonInput" accept="application/json" class="hidden">
          <button class="btn btn-outline btn-sm" id="exportExcelBtn">${ICONS.download} Export to Excel (multi-sheet)</button>
        </div>
        <div class="divider"></div>
        <h3 style="font-family:var(--font-display);font-size:15px;margin-bottom:10px;color:var(--danger-dark);">Danger Zone</h3>
        <p class="text-muted" style="font-size:12px;margin-bottom:10px;">Clear sales history only, or wipe everything (products, stock, sales, customers) to start completely fresh.</p>
        <div class="flex gap-8" style="flex-wrap:wrap;">
          <button class="btn btn-danger btn-sm" id="wipeSalesBtn">Clear Sales History Only</button>
          <button class="btn btn-danger btn-sm" id="wipeAllBtn">Clear ALL Data</button>
        </div>
      </div>
    </div>
  `;

renderSyncHistoryList();
  renderThemeSwatches();

  /* ---- Display Zoom ---- */
  const zoomSlider = document.getElementById('zoomSlider');
  const zoomNumber = document.getElementById('zoomNumber');
  const zoomResetBtn = document.getElementById('zoomResetBtn');
  if(zoomSlider && zoomNumber){
    zoomSlider.oninput = (e) => {
      const v = applyZoom(e.target.value);
      zoomNumber.value = v;
    };
    zoomNumber.oninput = (e) => {
      const v = applyZoom(e.target.value);
      zoomSlider.value = v;
    };
    zoomNumber.onblur = (e) => {
      const v = applyZoom(e.target.value);
      e.target.value = v;
      zoomSlider.value = v;
    };
    zoomResetBtn.onclick = () => {
      const v = applyZoom(100);
      zoomSlider.value = v;
      zoomNumber.value = v;
      toast('Zoom reset to 100%', 'success');
    };
  }

  document.getElementById('saveMenuVisibility').onclick = () => {
    SETTINGS.menuVisibility = {
      customers: document.getElementById('mvCustomers').checked,
      media: document.getElementById('mvMedia').checked,
      products: document.getElementById('mvProducts').checked,
      priceEdit: document.getElementById('mvPriceEdit').checked
    };
    saveSettings();
    renderShell();
    switchView('settings');
    toast('Menu visibility saved', 'success');
  };
  /* ---- Logo upload ---- */
  let pendingLogo = SETTINGS.storeLogo || '';
  document.getElementById('logoInput').onchange = (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    if(file.size > 1024*1024){ toast('Logo too large (max 1MB)', 'error'); return; }
    const reader = new FileReader();
    reader.onload = (ev)=>{
      pendingLogo = ev.target.result;
      SETTINGS.storeLogo = pendingLogo;
      saveSettings();
      renderShell(); switchView('settings');
      toast('Logo updated', 'success');
    };
    reader.readAsDataURL(file);
  };
  const removeLogoBtn = document.getElementById('removeLogoBtn');
  if(removeLogoBtn) removeLogoBtn.onclick = () => {
    SETTINGS.storeLogo = '';
    saveSettings();
    renderShell(); switchView('settings');
    toast('Logo removed', 'success');
  };

  /* ---- Store contacts manager ---- */
  let workingContacts = (SETTINGS.storeContacts||[]).slice();
  if(!workingContacts.length) workingContacts = [''];
  function renderContactsList(){
    const wrap = document.getElementById('contactsList');
    wrap.innerHTML = workingContacts.map((val,i)=>`
      <div class="flex gap-8" style="margin-bottom:8px;">
        <input type="text" class="contactInput" data-i="${i}" value="${escapeHtml(val)}" placeholder="e.g. 024xxxxxxx" style="flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);">
        <button class="btn btn-outline btn-icon" data-removecontact="${i}">✕</button>
      </div>
    `).join('');
    wrap.querySelectorAll('.contactInput').forEach(inp=>{
      inp.oninput = (e)=>{ workingContacts[Number(e.target.dataset.i)] = e.target.value; };
    });
    wrap.querySelectorAll('[data-removecontact]').forEach(btn=>{
      btn.onclick = ()=>{ workingContacts.splice(Number(btn.dataset.removecontact),1); if(!workingContacts.length) workingContacts=['']; renderContactsList(); };
    });
  }
  renderContactsList();
  document.getElementById('addContactBtn').onclick = () => { workingContacts.push(''); renderContactsList(); };
  document.getElementById('saveContactsBtn').onclick = () => {
    SETTINGS.storeContacts = workingContacts.map(c=>c.trim()).filter(Boolean);
    saveSettings();
    toast('Contact numbers saved', 'success');
  };

  /* ---- Cashiers manager ---- */
  let workingCashiers = (SETTINGS.cashiers||[]).map(c=>({...c}));
  function renderCashiersList(){
    const wrap = document.getElementById('cashiersList');
    if(!workingCashiers.length){
      wrap.innerHTML = `<p class="text-muted" style="font-size:12.5px;">No cashiers added yet.</p>`;
      return;
    }
    wrap.innerHTML = workingCashiers.map((cs,i)=>`
      <div class="flex gap-8" style="margin-bottom:8px;">
        <input type="text" class="cashierInput" data-i="${i}" value="${escapeHtml(cs.name)}" placeholder="Cashier name" style="flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);">
        <button class="btn btn-outline btn-icon" data-removecashier="${i}">✕</button>
      </div>
    `).join('');
    wrap.querySelectorAll('.cashierInput').forEach(inp=>{
      inp.oninput = (e)=>{ workingCashiers[Number(e.target.dataset.i)].name = e.target.value; };
    });
    wrap.querySelectorAll('[data-removecashier]').forEach(btn=>{
      btn.onclick = ()=>{ workingCashiers.splice(Number(btn.dataset.removecashier),1); renderCashiersList(); };
    });
  }
  renderCashiersList();
  document.getElementById('addCashierBtn').onclick = () => { workingCashiers.push({id: uid('CSH-'), name:''}); renderCashiersList(); };
  document.getElementById('saveCashiersBtn').onclick = () => {
    SETTINGS.cashiers = workingCashiers.filter(c=>c.name.trim()).map(c=>({id:c.id, name:c.name.trim()}));
    saveSettings();
    toast('Cashiers saved', 'success');
  };

  document.getElementById('saveStoreSettings').onclick = () => {
    SETTINGS.storeName = document.getElementById('setStoreName').value.trim() || 'Gliffits Mart';
    SETTINGS.storeAddress = document.getElementById('setStoreAddress').value.trim();
    SETTINGS.currency = document.getElementById('setCurrency').value.trim() || 'GHS';
    SETTINGS.lowStockThreshold = parseInt(document.getElementById('setLowStock').value,10) || 0;
    SETTINGS.receiptFooter = document.getElementById('setFooter').value.trim();
    saveSettings();
    renderShell();
    switchView('settings');
    toast('Store settings saved', 'success');
  };

  document.getElementById('savePrinterSettings').onclick = () => {
    SETTINGS.printerType = document.getElementById('setPrinterType').value;
    SETTINGS.directPrintEnabled = document.getElementById('setDirectPrint').checked;
    SETTINGS.printerBaudRate = parseInt(document.getElementById('setBaudRate').value,10) || 9600;
    saveSettings();
    toast('Printer settings saved', 'success');
  };
  document.getElementById('connectPrinterBtn').onclick = () => connectThermalPrinter(false);
  document.getElementById('testPrinterBtn').onclick = () => testThermalPrinter();

  document.getElementById('saveMsgTemplates').onclick = () => {
    SETTINGS.whatsappTemplate = document.getElementById('setWaTpl').value;
    SETTINGS.smsTemplate = document.getElementById('setSmsTpl').value;
    saveSettings();
    toast('Message templates saved', 'success');
  };

document.querySelectorAll('input[type="password"]').forEach(inp=>{ inp.value = ''; });
  document.querySelectorAll('[data-pwfield]').forEach(btn=>{
    btn.onclick = () => {
      const field = btn.dataset.pwfield;
      const cur = document.getElementById('cur_'+field).value;
      const nw = document.getElementById('new_'+field).value;
      const conf = document.getElementById('conf_'+field).value;
      if(cur !== SETTINGS[field]){ toast('Current password is incorrect', 'error'); return; }
      if(!nw || nw.length<4){ toast('New password must be at least 4 characters', 'error'); return; }
      if(nw !== conf){ toast('New passwords do not match', 'error'); return; }
      SETTINGS[field] = nw;
      saveSettings();
      toast('Password updated successfully', 'success');
      ['cur_','new_','conf_'].forEach(pfx=>document.getElementById(pfx+field).value='');
    };
  });

  document.getElementById('saveSyncSettingsBtn').onclick = () => {
    SYNC.url = document.getElementById('setSyncUrl').value.trim();
    SYNC.anonKey = document.getElementById('setSyncKey').value.trim();
    SYNC.productsTable = document.getElementById('setSyncProductsTable').value.trim() || 'products';
    SYNC.salesTable = document.getElementById('setSyncSalesTable').value.trim() || 'sales';
    SYNC.customersTable = document.getElementById('setSyncCustomersTable').value.trim() || 'customers';
    SYNC.syncIntervalSec = Math.max(20, parseInt(document.getElementById('setSyncInterval').value,10) || 60);
    SYNC.autoSync = document.getElementById('setSyncAuto').checked;
    saveSync();
    startAutoSyncLoop();
    toast('Sync settings saved', 'success');
    if(isSyncConfigured()) runSync(true);
  };
  document.getElementById('syncNowBtn').onclick = () => runSync(true);

  document.getElementById('exportFullJsonBtn').onclick = exportFullBackupJson;
  document.getElementById('importFullJsonBtn').onclick = () => document.getElementById('importFullJsonInput').click();
  document.getElementById('importFullJsonInput').onchange = handleImportFullBackup;
  document.getElementById('exportExcelBtn').onclick = exportFullExcel;

  document.getElementById('wipeSalesBtn').onclick = () => {
    requestPasswordFor('deletePassword', 'Delete Password Required', 'Enter the delete password to clear sales history', () => {
      confirmDialog('This will permanently delete all sales history. Continue?', () => {
        SALES = [];
        saveSales();
        toast('Sales history cleared', 'success');
        renderSettingsView();
      });
    });
  };

  document.getElementById('wipeAllBtn').onclick = () => {
    requestPasswordFor('deletePassword', 'Delete Password Required', 'Enter the delete password to wipe all data', () => {
      confirmDialog('This will permanently delete ALL data — products, stock, sales history and customers — and cannot be undone. Continue?', () => {
        PRODUCTS.forEach(p=>queueDelete('products', p.id));
        CUSTOMERS.forEach(c=>queueDelete('customers', c.id));
        PRODUCTS = [];
        SALES = [];
        CUSTOMERS = [];
        selectedCustomerIds = new Set();
        SETTINGS = { ...DEFAULT_SETTINGS, storeName: SETTINGS.storeName, adminPassword: SETTINGS.adminPassword, deletePassword: SETTINGS.deletePassword, pricePassword: SETTINGS.pricePassword, messagePassword: SETTINGS.messagePassword, storeAddress: SETTINGS.storeAddress, storeContacts: SETTINGS.storeContacts, storeLogo: SETTINGS.storeLogo, cashiers: SETTINGS.cashiers };
        saveProducts(); saveSales(); saveCustomers(); saveSettings();
        toast('All data cleared', 'success');
        renderShell();
        switchView('settings');
      });
    });
  };
}

function exportFullBackupJson(){
  const backup = {
    exportedAt: new Date().toISOString(),
    appVersion: '1.1',
    store: SETTINGS.storeName,
    products: PRODUCTS,
    sales: SALES,
    customers: CUSTOMERS,
    settings: SETTINGS
  };
  downloadBlob(JSON.stringify(backup, null, 2), `gliffits-pos-full-backup-${Date.now()}.json`, 'application/json');
  toast('Full backup exported — copy this file to your new machine', 'success');
}

function handleImportFullBackup(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try{
      const data = JSON.parse(ev.target.result);
      if(!data || (!data.products && !data.sales && !data.customers)){
        toast('This does not look like a valid full backup file', 'error');
        return;
      }
      confirmDialog('Importing will REPLACE your current products, sales and customers with the data in this file. Continue?', () => {
        if(Array.isArray(data.products)) PRODUCTS = data.products;
        if(Array.isArray(data.sales)) SALES = data.sales;
        if(Array.isArray(data.customers)) CUSTOMERS = data.customers;
        if(data.settings){
          SETTINGS = { ...DEFAULT_SETTINGS, ...data.settings, adminPassword: SETTINGS.adminPassword, deletePassword: SETTINGS.deletePassword, pricePassword: SETTINGS.pricePassword, messagePassword: SETTINGS.messagePassword };
        }
        PRODUCTS.forEach(p=>{ if(!Array.isArray(p.history)) p.history = []; });
        CUSTOMERS.forEach(c=>{ if(!c.id) c.id = uid('CUS-'); });
        saveProducts(); saveSales(); saveCustomers(); saveSettings();
        toast('Full backup imported successfully', 'success');
        renderShell();
        switchView('dashboard');
      });
    }catch(err){
      toast('Invalid backup JSON file', 'error');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

function exportFullExcel(){

    'Price': p.price, 'Quantity in Stock': p.qty, 'Date Added': fmtDate(p.dateAdded),
    'Has Picture': p.image ? 'Yes' : 'No',

  }));
  const wsProducts = XLSX.utils.json_to_sheet(productsSheet);

  }));
  const wsSales = XLSX.utils.json_to_sheet(salesSheet);
  XLSX.utils.book_append_sheet(wb, wsSales, 'Sales History');

    'Name': c.name, 'Phone': c.phone||'', 'Location': c.location||'',

    { Metric: 'Store Address', Value: SETTINGS.storeAddress || '' },
    { Metric: 'Contact Numbers', Value: (SETTINGS.storeContacts||[]).join(', ') },

  XLSX.utils.book_append_sheet(wb, wsSummary, 'Summary');

  XLSX.writeFile(wb, `gliffits-mart-export-${Date.now()}.xlsx`);
  toast('Excel file exported with Products, Sales, Customers & Summary sheets', 'success');

/* ============================================================
   APP EXIT CONFIRMATION
   A dedicated in-app "power" button asks for confirmation before
   closing. Browsers can't fully intercept the OS window-close (X)
   button with a custom dialog, so we also wire the standard
   beforeunload prompt as a fallback for that case — it shows the
   browser's own "Leave site?" confirmation.
   ============================================================ */
let intentionalExit = false;
window.addEventListener('beforeunload', (e)=>{
  if(intentionalExit) return;
  e.preventDefault();
  e.returnValue = '';
});

function requestAppExit(){
  ensureModalRoot();
  const root = document.getElementById('modalRoot');
  const wrap = document.createElement('div');
  wrap.className = 'modal-overlay show';
  wrap.innerHTML = `
    <div class="modal" style="max-width:380px;">
      <div class="modal-body">
        <div class="gate-box" style="padding-top:0;">
          <div class="gate-ico" style="background:linear-gradient(135deg, var(--danger), var(--danger-dark));">⏻</div>
          <h3>Close Gliffits Mart POS?</h3>
          <p>Your products, sales and customers are already saved. Any items still in the current cart will be lost.</p>
        </div>
      </div>
      <div class="modal-foot" style="justify-content:center;">
        <button class="btn btn-outline" id="exitCancelBtn">Stay Open</button>
        <button class="btn btn-danger" id="exitConfirmBtn">Yes, Close App</button>
      </div>
    </div>
  `;
  root.appendChild(wrap);
  wrap.querySelector('#exitCancelBtn').onclick = () => wrap.remove();
  wrap.onclick = (e)=>{ if(e.target===wrap) wrap.remove(); };
  wrap.querySelector('#exitConfirmBtn').onclick = () => {
    intentionalExit = true;
    wrap.remove();
    window.close();
    setTimeout(()=>{
      // window.close() only works for tabs/windows opened by a script;
      // if we're still here, the browser blocked it — lock the app instead.
      intentionalExit = false;
      toast('You can now close this browser tab or window', 'info');
      showLockGate();
    }, 350);
  };
}

async function runLoadingSequence(){
  loadState();
  setLoadingProgress(10, 'Loading store settings…');
  await wait(200);
  setLoadingProgress(30, 'Restoring products & stock…');
  await wait(220);
  setLoadingProgress(50, 'Loading sales history & customers…');
  await wait(200);
  setLoadingProgress(68, 'Reconnecting saved music & video…');
  try{ await restoreMediaLibrary(); }catch(e){ /* media restore is best-effort */ }
  setLoadingProgress(90, 'Preparing the counter…');
  await wait(260);
  setLoadingProgress(100, 'Ready!');
  await wait(250);
}

function showLockGate(){

    <div class="lock-card">

      <div class="lock-err" id="gateErr"></div>
      <button class="btn btn-primary btn-block" id="gateSubmit">Unlock App</button>
    </div>
  `;
  document.body.appendChild(gate);
  const input = gate.querySelector('#gatePwInput');
  const card = gate.querySelector('.lock-card');

  function tryUnlock(){
    if(input.value === SETTINGS.adminPassword){
      gate.remove();
      startApp();

      card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake');
      err.textContent = 'Incorrect password. Try again.';
      input.value=''; input.focus();
    }
  }
  gate.querySelector('#gateSubmit').onclick = tryUnlock;
  input.onkeydown = (e)=>{ if(e.key==='Enter') tryUnlock(); };
}

let stockAnalysisFilter = { preset:'all', from:'', to:'' };
function stockAnalysisRange(){
  const now = new Date();
  if(stockAnalysisFilter.preset==='today'){
    const start = new Date(now); start.setHours(0,0,0,0);
    return { from: start, to: now };
  }
  if(stockAnalysisFilter.preset==='7d'){
    const start = new Date(now); start.setDate(start.getDate()-7);
    return { from: start, to: now };
  }
  if(stockAnalysisFilter.preset==='month'){
    const start = new Date(now.getFullYear(), now.getMonth(), 1);
    return { from: start, to: now };
  }
  if(stockAnalysisFilter.preset==='custom'){
    return {
      from: stockAnalysisFilter.from ? new Date(stockAnalysisFilter.from) : null,
      to: stockAnalysisFilter.to ? new Date(stockAnalysisFilter.to+'T23:59:59') : null
    };
  }
  return { from:null, to:null }; // all time
}
function filterHistoryByRange(historyArr){
  const { from, to } = stockAnalysisRange();
  return historyArr.filter(h=>{
    const t = new Date(h.timestamp);
    if(from && t < from) return false;
    if(to && t > to) return false;
    return true;
  });
}

function stockAnalysisFilteredProducts(){
  let list = PRODUCTS.slice().sort((a,b)=> a.name.localeCompare(b.name));
  if(stockAnalysisTableSearch){
    list = list.filter(p => p.name.toLowerCase().includes(stockAnalysisTableSearch) ||
      p.id.toLowerCase().includes(stockAnalysisTableSearch) ||
      (p.category||'').toLowerCase().includes(stockAnalysisTableSearch));
  }
  return list;
}

function historyRowLabel(h){
  if(h.type==='refill') return { type:'Refill', details:`+${h.addedQty} units (${h.oldQty} \u2192 ${h.newQty})`, amount: fmtMoney(h.price) + (h.costPrice!=null?' (cost '+fmtMoney(h.costPrice)+')':''), stockAfter: h.newQty };
  if(h.type==='price_change') return { type:(h.field==='price'?'Selling':'Cost')+' Price Change', details:`${fmtMoney(h.oldValue)} \u2192 ${fmtMoney(h.newValue)}`, amount:'', stockAfter:'' };
  if(h.type==='sale') return { type:'Sale', details:`${h.qty} unit(s) to ${h.customerName}`, amount: fmtMoney(h.unitPriceApplied) + (h.profit!=null?' (profit '+fmtMoney(h.profit)+')':''), stockAfter: h.remainingStockAfter };
  return { type:'', details:'', amount:'', stockAfter:'' };
}

function stockAnalysisFlattenRows(products){
  const rows = [];
  products.forEach(p=>{
    filterHistoryByRange(p.history||[]).forEach(h=>{
      const lbl = historyRowLabel(h);
      rows.push({ 'Product': p.name, 'Product ID': p.id, 'Date': fmtDate(h.timestamp), 'Type': lbl.type, 'Details': lbl.details, 'Amount': lbl.amount, 'Stock After': lbl.stockAfter });
    });
  });
  return rows;
}

function openProductHistoryModal(productId){
  const p = PRODUCTS.find(x=>x.id===productId);
  if(!p) return;
  ensureModalRoot();
  const root = document.getElementById('modalRoot');
  const wrap = document.createElement('div');
  wrap.className = 'modal-overlay show';
  const hist = filterHistoryByRange(p.history||[]).slice().sort((a,b)=> new Date(b.timestamp)-new Date(a.timestamp));

  const rows = hist.map(h=>{
    const lbl = historyRowLabel(h);
    const typeClass = h.type==='refill' ? 'refill' : (h.type==='price_change' ? 'price' : 'sale');
    const icon = h.type==='refill' ? '📦' : (h.type==='price_change' ? (h.newValue>h.oldValue?'⬆':'⬇') : '🧾');
    let sub = '';
    if(h.type==='sale' && h.batchesUsed && h.batchesUsed.length){
      sub = `<div class="audit-detail-sub">Batches: ${h.batchesUsed.map(b=>`${b.qty}@${fmtMoney(b.price)}`).join(', ')}</div>`;
    }
    return `<tr>
      <td class="audit-date">${fmtDate(h.timestamp)}</td>
      <td><span class="audit-row-type ${typeClass}">${icon} ${lbl.type}</span></td>
      <td>${escapeHtml(lbl.details)}${sub}</td>
      <td class="audit-amount">${lbl.amount || '—'}</td>
      <td>${lbl.stockAfter!=='' ? lbl.stockAfter : '—'}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="5"><div class="empty-state" style="padding:30px 10px;"><div class="ico">📄</div><h3>No activity</h3><p>Nothing happened in this range.</p></div></td></tr>`;

  wrap.innerHTML = `
    <div class="modal modal-lg modal-audit">
      <div class="modal-head"><h3>${escapeHtml(p.name)} — Audit Timeline</h3><button class="modal-close" id="phClose">✕</button></div>
      <div class="modal-body">
        <div class="audit-stats">
          <div class="audit-stat stock">Current Stock<b>${p.qty}</b></div>
          <div class="audit-stat sell">Selling Price<b>${fmtMoney(p.price)}</b></div>
          ${p.costPrice!=null ? `<div class="audit-stat cost">Cost Price<b>${fmtMoney(p.costPrice)}</b></div>` : ''}
          <div class="audit-stat">Events in Range<b>${hist.length}</b></div>
        </div>
        <div class="audit-table-wrap">
          <table>
            <thead><tr><th>Date</th><th>Type</th><th>Details</th><th>Amount</th><th>Stock After</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-outline btn-sm" id="phPrint">${ICONS.print} Print / PDF</button>
        <button class="btn btn-outline btn-sm" id="phExcel">${ICONS.download} Excel</button>
        <button class="btn btn-outline btn-sm" id="phJson">${ICONS.download} JSON</button>
        <button class="btn btn-primary" id="phClose2" style="margin-left:auto;">Close</button>
      </div>
    </div>`;
  root.appendChild(wrap);
  const close = () => wrap.remove();
  document.getElementById('phClose').onclick = close;
  document.getElementById('phClose2').onclick = close;
  document.getElementById('phPrint').onclick = () => printProductHistory(p.id);
  document.getElementById('phExcel').onclick = () => exportProductHistoryExcel(p.id);
  document.getElementById('phJson').onclick = () => exportProductHistoryJson(p.id);
  wrap.onclick = (e)=>{ if(e.target===wrap) close(); };
}

function exportProductHistoryJson(productId){
  const p = PRODUCTS.find(x=>x.id===productId);
  if(!p) return;
  const hist = filterHistoryByRange(p.history||[]);
  if(!hist.length){ toast('No activity to export in this range', 'error'); return; }
  downloadBlob(JSON.stringify({exportedAt:new Date().toISOString(), product:{id:p.id,name:p.name,category:p.category,price:p.price,costPrice:p.costPrice,qty:p.qty}, history:hist}, null, 2),
    `${p.name.replace(/[^a-z0-9]+/gi,'-')}-history-${Date.now()}.json`, 'application/json');
  toast('Product history exported as JSON', 'success');
}

function exportProductHistoryExcel(productId){
  if(typeof XLSX === 'undefined'){ toast('Excel library failed to load — check your internet connection', 'error'); return; }
  const p = PRODUCTS.find(x=>x.id===productId);
  if(!p) return;
  const rows = stockAnalysisFlattenRows([p]);
  if(!rows.length){ toast('No activity to export in this range', 'error'); return; }
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(rows);
  XLSX.utils.book_append_sheet(wb, ws, 'History');
  XLSX.writeFile(wb, `${p.name.replace(/[^a-z0-9]+/gi,'-')}-history-${Date.now()}.xlsx`);
  toast('Product history exported to Excel', 'success');
}

function printProductHistory(productId){
  const p = PRODUCTS.find(x=>x.id===productId);
  if(!p) return;
  const hist = filterHistoryByRange(p.history||[]).slice().sort((a,b)=> new Date(b.timestamp)-new Date(a.timestamp));
  if(!hist.length){ toast('No activity to export in this range', 'error'); return; }
  const rowsHtml = hist.map(h=>{
    const lbl = historyRowLabel(h);
    return `<tr>
      <td style="padding:6px;border:1px solid #ddd;">${fmtDate(h.timestamp)}</td>
      <td style="padding:6px;border:1px solid #ddd;">${escapeHtml(lbl.type)}</td>
      <td style="padding:6px;border:1px solid #ddd;">${escapeHtml(lbl.details)}</td>
      <td style="padding:6px;border:1px solid #ddd;">${escapeHtml(String(lbl.amount||''))}</td>
      <td style="padding:6px;border:1px solid #ddd;">${lbl.stockAfter!=='' ? lbl.stockAfter : '—'}</td>
    </tr>`;
  }).join('');
  const html = `
    <div style="font-family:Arial,sans-serif;padding:10px;">
      <h2 style="margin-bottom:2px;">${escapeHtml(SETTINGS.storeName)} — ${escapeHtml(p.name)}</h2>
      <p style="color:#555;margin-bottom:14px;font-size:12px;">Generated ${fmtDate(new Date().toISOString())} · Stock: ${p.qty} · Selling: ${fmtMoney(p.price)}${p.costPrice!=null?' · Cost: '+fmtMoney(p.costPrice):''} · ${hist.length} event(s)</p>
      <table style="width:100%;border-collapse:collapse;font-size:11px;">
        <thead><tr style="background:#f0f0f0;">
          ${['Date','Type','Details','Amount','Stock After'].map(h=>`<th style="text-align:left;padding:6px;border:1px solid #ddd;">${h}</th>`).join('')}
        </tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
    </div>`;
  setPrintPageStyle();
  document.getElementById('print-area').innerHTML = html;
  toast('Opening print dialog — choose "Save as PDF"', 'info');
  setTimeout(()=>{
    window.print();
    setTimeout(()=>{ document.getElementById('print-area').innerHTML = ''; }, 500);
  }, 200);
}
</script>
</body>
</html>
