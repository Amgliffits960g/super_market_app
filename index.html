function refreshTotalsOnly(){
  const subtotal = cartSubtotal();
  const discount = window.__discount||0;
  const total = Math.max(subtotal-discount,0);
  const rows = document.querySelectorAll('.totals-box .tot-row');
  if(rows[0]) rows[0].querySelector('span:last-child').textContent = fmtMoney(subtotal);
  if(rows[1]){
    rows[1].querySelector('span:last-child').textContent = '- ' + fmtMoney(discount);
    rows[1].classList.toggle('zero', discount<=0);
  }
  if(rows[2]) rows[2].querySelector('span:last-child').textContent = fmtMoney(total);
  const checkoutBtn = document.getElementById('checkoutBtn');
  if(checkoutBtn && !checkoutBtn.disabled) checkoutBtn.textContent = 'Complete Sale · ' + fmtMoney(total);
  const changeRow = document.getElementById('changeRow');
  const changeVal = document.getElementById('changeVal');
  if(activePayMethod==='Cash' && window.__tendered!==undefined && !isNaN(window.__tendered)){
    const change = window.__tendered - total;
    changeRow.style.display = 'flex';
    changeVal.textContent = fmtMoney(Math.max(change,0));
    changeVal.style.color = change<0 ? 'var(--danger)' : '';
    if(change<0){ changeVal.textContent = 'Insufficient: ' + fmtMoney(Math.abs(change)) + ' short'; }
  } else if(changeRow){
    changeRow.style.display = 'none';
  }
}

/* ---------------- CHECKOUT ---------------- */
function completeSale(){
  const lines = cartLines();
  if(!lines.length){ toast('Cart is empty', 'error'); return; }
  const subtotal = cartSubtotal();
  const discount = Math.min(window.__discount||0, subtotal);
  const total = Math.max(subtotal-discount,0);
  let tendered = window.__tendered;
  if(activePayMethod==='Cash'){
    if(tendered===undefined || isNaN(tendered) || tendered < total){
      toast('Enter a valid amount tendered (must cover the total)', 'error');
      cartDetailsOpen = true; renderCartPanel();
      const ti = document.getElementById('tenderedInput'); if(ti) ti.focus();
      return;
    }
  } else {
    tendered = total;
  }
  const change = activePayMethod==='Cash' ? (tendered-total) : 0;

  for(const l of lines){
    const p = PRODUCTS.find(x=>x.id===l.productId);
    if(!p || p.qty < l.qty){ toast(`Not enough stock for ${l.product.name}`, 'error'); return; }
  }
const nowIso = new Date().toISOString();
  const cashier = SETTINGS.cashiers.find(cs=>cs.id===window.__cashierId);
  const sale = {
    id: uid('TXN-'),
    timestamp: nowIso,
    lastUpdated: nowIso,
    items: lines.map(l=>({ productId:l.productId, name:l.product.name, price:l.product.price, qty:l.qty, lineTotal:l.lineTotal })),
    subtotal, discount, total, paymentMethod: activePayMethod,
    amountTendered: tendered, change,
    customerName: (window.__custName||'').trim() || 'Walk-in customer',
    customerPhone: (window.__custPhone||'').trim(),
    cashierName: cashier ? cashier.name : ''
  };

  lines.forEach(l=>{
    const p = PRODUCTS.find(x=>x.id===l.productId);
    const result = consumeStockFIFO(p, l.qty);
    p.qty -= l.qty; // qty stays the single source of truth for stock badges/UI
    p.lastUpdated = nowIso;

    p.history.push({
      type: 'sale',
      timestamp: nowIso,
      saleId: sale.id,
      qty: l.qty,
      batchesUsed: result ? result.batchesUsed : [],
      unitPriceApplied: l.product.price,
      discountShare: subtotal>0 ? (discount * (l.lineTotal/subtotal)) : 0,
      customerName: sale.customerName,
      remainingStockAfter: p.qty,
      profit: result ? (result.totalRevenue - result.totalCost) : null // null if any batch had no costPrice
    });
  });
  saveProducts();

  SALES.unshift(sale);
  saveSales();
  upsertCustomerFromPhone(sale.customerName, sale.customerPhone);

  lastReceiptSale = sale;
  CART = [];
  window.__discount = 0; window.__tendered = undefined; window.__custName=''; window.__custPhone='';
  cartDetailsOpen = false;
  activePayMethod = 'Cash';
  renderPosView();
  updateTopBadges();
  toast('Sale completed successfully', 'success');
  openReceiptModal(sale);
}

/* ============================================================
   DIRECT THERMAL PRINTING — ESC/POS over Web Serial (USB/COM)
   Bypasses the OS/browser print dialog entirely: we send raw
   printer commands, including the paper-cut command, so the
   printer feeds only exactly as much paper as the receipt needs
   and cuts automatically. Requires Chrome or Edge on desktop,
   served over https or localhost (not available from a plain
   local file, and not available on mobile).
   ============================================================ */
let thermalUSBDevice = null;

function directPrintSupported(){
  return typeof navigator !== 'undefined' && 'usb' in navigator;
}

async function connectThermalPrinter(silent){
  if(!directPrintSupported()){
    if(!silent) toast('Direct printing needs Chrome or Edge on a desktop computer, served over https/localhost', 'error');
    return false;
  }
  try{
    const known = await navigator.usb.getDevices();
    // Look for already paired USB devices, or ask the user to pair one
    thermalUSBDevice = known[0] || (silent ? null : await navigator.usb.requestDevice({ filters: [] }));
    if(!thermalUSBDevice) return false;
    
    // Open connection and claim the printing interface
    if(!thermalUSBDevice.opened){
      await thermalUSBDevice.open();
      await thermalUSBDevice.selectConfiguration(1);
      await thermalUSBDevice.claimInterface(0);
    }
    
    navigator.usb.addEventListener('disconnect', (e)=>{
      if(e.device === thermalUSBDevice) thermalUSBDevice = null;
    });
    
    if(!silent) toast('Thermal printer connected via USB', 'success');
    return true;
  }catch(e){
    if(!silent) toast('Could not connect to printer: ' + e.message, 'error');
    thermalUSBDevice = null;
    return false;
  }
}

async function sendRawToPrinter(bytes){
  if(!thermalUSBDevice){
    const ok = await connectThermalPrinter(false);
    if(!ok) return false;
  }
  try{
    if(!thermalUSBDevice.opened){
      await thermalUSBDevice.open();
      await thermalUSBDevice.selectConfiguration(1);
      await thermalUSBDevice.claimInterface(0);
    }
    
    // Xprinters usually receive data on Endpoint 1 or Endpoint 2.
    // We try Endpoint 1 first; if it fails, we try Endpoint 2.
    try {
      await thermalUSBDevice.transferOut(1, bytes);
    } catch(err) {
      await thermalUSBDevice.transferOut(2, bytes);
    }
    return true;
  }catch(e){
    toast('Print failed: ' + e.message, 'error');
    thermalUSBDevice = null;
    return false;
  }
}

/* Build raw ESC/POS bytes for a sale receipt, sized to the paper width,
   ending in a feed + full paper cut so nothing is wasted. */
function escposReceiptBytes(sale){
  const width = SETTINGS.printerType === 'thermal58' ? 32 : 42;
  const enc = new TextEncoder();
  const bytes = [];
  const raw = (...arr) => arr.forEach(b=>bytes.push(b));
  const text = (str) => { bytes.push(...enc.encode(str)); };
  const line = (str='') => { text(str); bytes.push(0x0A); };
  const center = (on) => raw(0x1B,0x61, on?1:0);
  const bold = (on) => raw(0x1B,0x45, on?1:0);
  const divider = () => line('-'.repeat(width));
  const wrap = (str) => {
    str = String(str);
    const out = [];
    while(str.length > width){ out.push(str.slice(0,width)); str = str.slice(width); }
    out.push(str);
    return out;
  };
  const padRow = (left,right) => {
    left = left||''; right = right||'';
    const space = Math.max(width - left.length - right.length, 1);
    return left + ' '.repeat(space) + right;
  };

  raw(0x1B,0x40); // init
  center(true);
  if(SETTINGS.storeLogo){
    // Logo images aren't rasterized in this lightweight text-mode path;
    // the store name is printed bold/large instead.
  }
  bold(true);
  line(SETTINGS.storeName.toUpperCase());
  bold(false);
  if(SETTINGS.storeAddress) wrap(SETTINGS.storeAddress).forEach(line);
  const contacts = (SETTINGS.storeContacts||[]).filter(Boolean);
  if(contacts.length) line('Tel: ' + contacts.join(' / '));
  center(false);
  divider();
  line('Receipt #: ' + sale.id);
  line('Date: ' + fmtDate(sale.timestamp));
  line('Customer: ' + sale.customerName);
  line('Payment: ' + sale.paymentMethod);
  if(sale.cashierName) line('Served by: ' + sale.cashierName);
  divider();
  sale.items.forEach(it=>{
    wrap(it.name).forEach(line);
    line(padRow(`${it.qty} x ${fmtMoney(it.price)}`, fmtMoney(it.lineTotal)));
  });
  divider();
  line(padRow('Subtotal', fmtMoney(sale.subtotal)));
  line(padRow('Discount', '-' + fmtMoney(sale.discount)));
  bold(true);
  line(padRow('TOTAL', fmtMoney(sale.total)));
  bold(false);
  line(padRow('Tendered', fmtMoney(sale.amountTendered)));
  line(padRow('Change', fmtMoney(sale.change)));
  divider();
  center(true);
  wrap(SETTINGS.receiptFooter).forEach(line);
  line('Powered by Gliffits Tech Hub POS');
  line('');
  line(sale.id);
  center(false);
  
  // Feed 4 blank lines to push the receipt past the thermal printhead
  line(''); line(''); line(''); line('');

  // ESC/POS Cut Command (Function B): GS V 66 n
  // Hex: 0x1D, 0x56, 0x42, 0x00
  // Feeds to the cutter position and performs a clean auto-cut.
  raw(0x1D, 0x56, 0x42, 0x00); 

  return new Uint8Array(bytes);
}

async function printReceiptDirect(sale){
  const bytes = escposReceiptBytes(sale);
  const ok = await sendRawToPrinter(bytes);
  if(ok) toast('Sent to thermal printer', 'success');
}

async function testThermalPrinter(){
  const ok = await connectThermalPrinter(false);
  if(!ok) return;
  const enc = new TextEncoder();
  const bytes = [
    0x1B, 0x40, 
    ...enc.encode('Printer connected OK\n'), 
    ...enc.encode(SETTINGS.storeName+'\n'), 
    0x0A, 0x0A, 0x0A, 0x0A, // Feed safe space
    0x1D, 0x56, 0x42, 0x00  // Clean feed and cut
  ];
  const sent = await sendRawToPrinter(new Uint8Array(bytes));
  if(sent) toast('Test slip sent — check the printer', 'success');
}

    list = list.filter(p => p.name.toLowerCase().includes(productsTableSearch) ||
      p.id.toLowerCase().includes(productsTableSearch) ||
      (p.category||'').toLowerCase().includes(productsTableSearch));
  }
  if(!list.length){
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="ico">📦</div><h3>No products yet</h3><p>Click "Add Product" to get started.</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(p=>{
    const status = p.qty<=0 ? `<span class="badge badge-danger">Out of stock</span>`
      : p.qty<=SETTINGS.lowStockThreshold ? `<span class="badge badge-warning">Low stock</span>`
      : `<span class="badge badge-success">In stock</span>`;
    return `
    <tr data-id="${p.id}">
<td><div class="cell-prod tvm-${tvm}"><div class="thumb-sz">${p.image?`<img src="${p.image}">`:ICONS.box}</div><span>${escapeHtml(p.name)}</span></div></td>
      <td><span class="pid-tag">${p.id}</span></td>
      <td>${escapeHtml(p.category||'Uncategorized')}</td>
      <td>${fmtMoney(p.price)}</td>
      <td>${p.qty}</td>
      <td>${status}</td>
      <td class="text-muted" style="font-size:12px;">${fmtDate(p.dateAdded)}</td>
      <td>
        <div class="row-actions">
          <button class="btn btn-outline btn-icon" data-act="edit" title="Edit">${ICONS.edit}</button>
          <button class="btn btn-danger btn-icon" data-act="delete" title="Delete">${ICONS.trash}</button>
        </div>
      </td>
    </tr>`;
  }).join('');
  tbody.querySelectorAll('tr').forEach(row=>{
    const id = row.dataset.id;
    const editBtn = row.querySelector('[data-act="edit"]');
    const delBtn = row.querySelector('[data-act="delete"]');
    if(editBtn) editBtn.onclick = () => openProductModal(id);
    if(delBtn) delBtn.onclick = () => {
      requestPasswordFor('deletePassword', 'Delete Password Required', 'Enter the delete password to remove this product', () => {
        confirmDialog('Delete this product? This cannot be undone.', () => {
          PRODUCTS = PRODUCTS.filter(p=>p.id!==id);
          queueDelete('products', id);
          saveProducts();
          productsTableSearch = '';
          const pts = document.getElementById('productTableSearch'); if(pts) pts.value = '';
          renderProductsTable();
          toast('Product deleted', 'success');
        });
      });
    };
  });
}

function openProductModal(productId){
  editingProductId = productId;
  const p = productId ? PRODUCTS.find(x=>x.id===productId) : null;
  ensureModalRoot();
  const root = document.getElementById('modalRoot');
  const wrap = document.createElement('div');
  wrap.className = 'modal-overlay show';
  wrap.id = 'productModalOverlay';
  const newId = p ? p.id : ('GTH-' + String(SETTINGS.nextProductSeq||1).padStart(4,'0'));
  wrap.innerHTML = `
    <div class="modal modal-lg">
      <div class="modal-head">
        <h3>${p ? 'Edit Product' : 'Add New Product'}</h3>
        <button class="modal-close" id="pmClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="img-drop" id="imgDrop">
          <img class="preview" id="imgPreview" src="${p&&p.image?p.image:''}" style="${p&&p.image?'display:block;':''}">
          <div class="ph-ico" id="imgPh" style="${p&&p.image?'display:none;':''}">${ICONS.image}</div>
          <small id="imgLabel">${p&&p.image?'Click to change image':'Click to upload product image (optional)'}</small>
          <input type="file" id="imgInput" accept="image/*">
        </div>
        <div class="form-grid mt-16">
          <div class="field-row full">
            <label>Product Name *</label>
            <input type="text" id="fName" value="${p?escapeHtml(p.name):''}" placeholder="e.g. Jasmine Rice 5kg">
          </div>
          <div class="field-row">
            <label>Price (${SETTINGS.currency}) *</label>
            <input type="number" id="fPrice" min="0" step="0.01" value="${p?p.price:''}" placeholder="0.00" ${(SETTINGS.menuVisibility&&SETTINGS.menuVisibility.priceEdit===false)?'disabled':''}>
          </div>
          ${!p ? `
          <div class="field-row">
            <label>Quantity in Stock *</label>
            <input type="number" id="fQty" min="0" step="1" value="" placeholder="0">
          </div>
          ` : ''}
          ${p ? `
          <div class="field-row full">
            <label>Current Stock: <b>${p.qty}</b></label>
            <label style="margin-top:8px;">+ Add Quantity (leave blank to keep current stock)</label>
            <input type="number" id="fAddQty" min="0" step="1" placeholder="e.g. 16">
            <div id="refillPreview" class="text-muted" style="font-size:12.5px;margin-top:6px;"></div>
          </div>
          ` : ''}
          <div class="field-row">
            <label>Cost Price (${SETTINGS.currency}) — optional</label>
            <input type="number" id="fCostPrice" min="0" step="0.01" value="${p&&p.costPrice!=null?p.costPrice:''}" placeholder="Leave blank if unknown">
            <div id="costPriceWarning" class="text-muted" style="font-size:11.5px;margin-top:4px;"></div>
          </div>
          <div class="field-row">
            <label>Category</label>
            <input type="text" id="fCategory" list="catList" value="${p?escapeHtml(p.category||''):''}" placeholder="e.g. Groceries">
            <datalist id="catList">${getCategories().filter(c=>c!=='All').map(c=>`<option value="${escapeHtml(c)}">`).join('')}</datalist>
          </div>
          <div class="field-row">
            <label>Product ID (auto-generated)</label>
            <input type="text" value="${newId}" disabled style="background:var(--bg);color:var(--muted);">
          </div>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-outline" id="pmCancel">Cancel</button>
        <button class="btn btn-primary" id="pmSave">${p ? 'Save Changes' : 'Add Product'}</button>
      </div>
    </div>
  `;
  root.appendChild(wrap);
  let pendingImage = p ? (p.image||'') : '';

  document.getElementById('imgInput').onchange = (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    if(file.size > 2*1024*1024){ toast('Image too large (max 2MB)', 'error'); return; }
    const reader = new FileReader();
    reader.onload = (ev) => {
      pendingImage = ev.target.result;
      document.getElementById('imgPreview').src = pendingImage;
      document.getElementById('imgPreview').style.display = 'block';
      document.getElementById('imgPh').style.display = 'none';
      document.getElementById('imgLabel').textContent = 'Click to change image';
    };
    reader.readAsDataURL(file);
  };

  function updateRefillPreview(){
    const addEl = document.getElementById('fAddQty');
    const preview = document.getElementById('refillPreview');
    if(!addEl || !preview || !p) return;
    const add = parseInt(addEl.value,10) || 0;
    preview.innerHTML = add>0
      ? `New total stock: <b>${p.qty} + ${add} = ${p.qty+add}</b>`
      : `Stock will remain at <b>${p.qty}</b>`;
  }

  function updatePriceWarnings(){
    if(!p) return;
    const newPrice = parseFloat(document.getElementById('fPrice').value);
    const newCost = parseFloat(document.getElementById('fCostPrice').value);
    let msg = '';
    if(!isNaN(newPrice) && newPrice !== p.price){
      msg += newPrice > p.price
        ? `⚠️ Selling Price increasing from ${fmtMoney(p.price)} to ${fmtMoney(newPrice)}. `
        : `⚠️ Selling Price decreasing from ${fmtMoney(p.price)} to ${fmtMoney(newPrice)}. `;
    }
    const cpEl = document.getElementById('costPriceWarning');
    if(cpEl && p.costPrice!=null && !isNaN(newCost) && newCost !== p.costPrice){
      cpEl.textContent = newCost > p.costPrice
        ? `⚠️ Cost Price increasing from ${fmtMoney(p.costPrice)} to ${fmtMoney(newCost)}`
        : `⚠️ Cost Price decreasing from ${fmtMoney(p.costPrice)} to ${fmtMoney(newCost)}`;
      cpEl.style.color = 'var(--warning)';
    }
  }

  const fPriceEl = document.getElementById('fPrice');
  const fCostPriceEl = document.getElementById('fCostPrice');
  if(fPriceEl) fPriceEl.oninput = updatePriceWarnings;
  if(fCostPriceEl) fCostPriceEl.oninput = updatePriceWarnings;
  const fAddQtyEl = document.getElementById('fAddQty');
  if(fAddQtyEl) fAddQtyEl.oninput = updateRefillPreview;

  const close = () => wrap.remove();
  document.getElementById('pmClose').onclick = close;
  document.getElementById('pmCancel').onclick = close;
  wrap.onclick = (e)=>{ if(e.target===wrap) close(); };

  document.getElementById('pmSave').onclick = () => {
    const name = document.getElementById('fName').value.trim();
    const priceEditAllowed = !(SETTINGS.menuVisibility && SETTINGS.menuVisibility.priceEdit === false);
    let price = parseFloat(document.getElementById('fPrice').value);
    if(p && !priceEditAllowed) price = p.price;
    const costPriceRaw = document.getElementById('fCostPrice').value;
    const costPrice = costPriceRaw==='' ? null : parseFloat(costPriceRaw);
    const category = document.getElementById('fCategory').value.trim() || 'Uncategorized';
    if(!name){ toast('Product name is required', 'error'); return; }
    if(isNaN(price) || price < 0){ toast('Enter a valid price', 'error'); return; }
    if(costPrice != null && !isNaN(costPrice) && price <= costPrice){
      toast('Selling price must be greater than the cost price', 'error');
      return;
    }

    const nowIso = new Date().toISOString();
    const priceChanged = p && Number(p.price) !== price;
    const costChanged  = p && p.costPrice !== costPrice;

const doSave = () => {
      if(p){
        const addQty = parseInt(document.getElementById('fAddQty').value, 10) || 0;
        const oldQty = p.qty;
        const newQty = oldQty + addQty;
        const oldPrice = p.price;
        const oldCostPrice = p.costPrice;

        p.name = name; p.category = category; p.image = pendingImage;
        if(priceEditAllowed) p.price = price;
        p.costPrice = costPrice;
        p.qty = newQty;
        p.lastUpdated = nowIso;

        if(!p.history) p.history = [];
        if(!p.batches) p.batches = [];

        if(addQty > 0){
          const batch = addStockBatch(p, addQty, price, costPrice);
          p.history.push({ type:'refill', timestamp: nowIso, addedQty: addQty, oldQty, newQty, price, costPrice, batchId: batch.id });
        }
        if(priceChanged){
          p.history.push({ type:'price_change', timestamp: nowIso, field:'price', oldValue: oldPrice, newValue: price });
        }
        if(costChanged){
          p.history.push({ type:'price_change', timestamp: nowIso, field:'costPrice', oldValue: oldCostPrice, newValue: costPrice });
        }
        toast('Product updated', 'success');
      } else {
        const qty = parseInt(document.getElementById('fQty').value, 10) || 0;
        const newP = {
          id: nextProductId(), name, price, qty, category, image: pendingImage,
          costPrice, batches: [], history: [],
          dateAdded: nowIso, lastUpdated: nowIso
        };
        if(qty > 0) addStockBatch(newP, qty, price, costPrice);
        newP.history.push({ type:'refill', timestamp: nowIso, addedQty: qty, oldQty:0, newQty:qty, price, costPrice, batchId: newP.batches[0]?.id });
        PRODUCTS.push(newP);
        toast('Product added', 'success');
      }
      saveProducts(); saveSettings();
      productsTableSearch = '';
      const pts = document.getElementById('productTableSearch'); if(pts) pts.value = '';
      renderProductsTable();
      close();
    };

    if(priceChanged){
      requestPasswordFor('pricePassword', 'Price Password Required', "Enter the price password to change this product's price", doSave);
    } else {
      doSave();
    }
  };
}

  const el = document.getElementById('viewCustomers');
  el.innerHTML = `
    <div class="section-head">
      <div><h1>Customers</h1><p>Store contacts and message them about receipts, offers &amp; new products</p></div>
      <div class="flex gap-8">
        <button class="btn btn-outline" id="bulkMessageBtn">${ICONS.whatsapp} Message Selected</button>
        <button class="btn btn-outline" id="bulkMessageAllBtn">${ICONS.whatsapp} Message ALL (One Click)</button>
        <button class="btn btn-primary" id="addCustomerBtn">+ Add Customer</button>
      </div>
    </div>
    <div class="table-toolbar">
      <div class="search-wrap" style="max-width:320px;margin-left:0;">
        <span class="icon">${ICONS.search}</span>
        <input type="text" id="customerTableSearch" placeholder="Search by name, phone, location...">
      </div>
      <div class="right-tools">
        <span class="text-muted" style="font-size:12.5px;align-self:center;">${CUSTOMERS.length} customer(s) · <span id="selCount">0</span> selected</span>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th><input type="checkbox" id="selectAllCust"></th>
          <th>Name</th><th>Phone</th><th>Location</th><th>Notes</th><th>Added</th><th></th>
        </tr></thead>
        <tbody id="customersTbody"></tbody>
      </table>
    </div>
  `;
  document.getElementById('addCustomerBtn').onclick = () => openCustomerModal(null);
  document.getElementById('bulkMessageBtn').onclick = () => {
    if(!selectedCustomerIds.size){ toast('Select at least one customer first', 'error'); return; }
    requestPasswordFor('messagePassword', 'Messaging Password Required', 'Enter the messaging password to contact customers', openBulkMessageModal);
  };
  document.getElementById('bulkMessageAllBtn').onclick = () => {
    if(!CUSTOMERS.filter(c=>c.phone).length){ toast('No customers with phone numbers saved yet', 'error'); return; }
    selectedCustomerIds = new Set(CUSTOMERS.filter(c=>c.phone).map(c=>c.id));
    requestPasswordFor('messagePassword', 'Messaging Password Required', 'Enter the messaging password to contact all customers', openBulkMessageModal);
  };
  document.getElementById('customerTableSearch').oninput = debounce(e=>{
    customersTableSearch = e.target.value.trim().toLowerCase();
    renderCustomersTable();
  }, 150);
  document.getElementById('selectAllCust').onchange = (e)=>{
    const list = filteredCustomers();
    if(e.target.checked){ list.forEach(c=>selectedCustomerIds.add(c.id)); }
    else{ list.forEach(c=>selectedCustomerIds.delete(c.id)); }
    renderCustomersTable();
  };
  renderCustomersTable();
}

function filteredCustomers(){
  let list = CUSTOMERS.slice().sort((a,b)=> new Date(b.dateAdded)-new Date(a.dateAdded));
  if(customersTableSearch){
    const q = customersTableSearch;
    list = list.filter(c => (c.name||'').toLowerCase().includes(q) ||
      (c.phone||'').toLowerCase().includes(q) ||
      (c.location||'').toLowerCase().includes(q));
  }
  return list;
}

function renderCustomersTable(){
  const tbody = document.getElementById('customersTbody');
  if(!tbody) return;
  const list = filteredCustomers();
  const selCount = document.getElementById('selCount');
  if(selCount) selCount.textContent = selectedCustomerIds.size;
  if(!list.length){
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="ico">👥</div><h3>No customers yet</h3><p>Add a customer to start sending receipts and offers via WhatsApp/SMS.</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(c=>`
    <tr data-id="${c.id}">
      <td><input type="checkbox" class="custCheck" ${selectedCustomerIds.has(c.id)?'checked':''}></td>
      <td><b>${escapeHtml(c.name)}</b></td>
      <td>${escapeHtml(c.phone||'—')}</td>
      <td>${escapeHtml(c.location||'—')}</td>
      <td class="text-muted" style="max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(c.notes||'')}</td>
      <td class="text-muted" style="font-size:12px;">${fmtDate(c.dateAdded)}</td>
      <td>
        <div class="row-actions">
          ${c.phone ? `<button class="btn btn-success btn-icon" data-act="msg" title="Message">${ICONS.whatsapp}</button>` : ''}
          <button class="btn btn-outline btn-icon" data-act="edit" title="Edit">${ICONS.edit}</button>
          <button class="btn btn-danger btn-icon" data-act="delete" title="Delete">${ICONS.trash}</button>
        </div>
      </td>
    </tr>
  `).join('');
  tbody.querySelectorAll('tr').forEach(row=>{
    const id = row.dataset.id;
    const check = row.querySelector('.custCheck');
    if(check) check.onchange = (e)=>{ if(e.target.checked) selectedCustomerIds.add(id); else selectedCustomerIds.delete(id); const sc=document.getElementById('selCount'); if(sc) sc.textContent = selectedCustomerIds.size; };
    const msgBtn = row.querySelector('[data-act="msg"]');
    if(msgBtn) msgBtn.onclick = () => { selectedCustomerIds = new Set([id]); requestPasswordFor('messagePassword', 'Messaging Password Required', 'Enter the messaging password to contact this customer', openBulkMessageModal); };
    const editBtn = row.querySelector('[data-act="edit"]');
    if(editBtn) editBtn.onclick = () => openCustomerModal(id);
    const delBtn = row.querySelector('[data-act="delete"]');
    if(delBtn) delBtn.onclick = () => {
      requestPasswordFor('deletePassword', 'Delete Password Required', 'Enter the delete password to remove this customer', () => {
        confirmDialog('Delete this customer? This cannot be undone.', () => {
          CUSTOMERS = CUSTOMERS.filter(c=>c.id!==id);
          selectedCustomerIds.delete(id);
          queueDelete('customers', id);
          saveCustomers();
          customersTableSearch = '';
          const cts = document.getElementById('customerTableSearch'); if(cts) cts.value = '';
          renderCustomersTable();
          toast('Customer deleted', 'success');
        });
      });
    };
  });
}

  document.getElementById('cmCancel').onclick = close;
  wrap.onclick = (e)=>{ if(e.target===wrap) close(); };
  document.getElementById('cmSave').onclick = () => {

/* ---------------- BULK MESSAGING (WhatsApp / SMS) ---------------- */
function openBulkMessageModal(){
  const targets = CUSTOMERS.filter(c=>selectedCustomerIds.has(c.id) && c.phone);
  if(!targets.length){ toast('Selected customer(s) have no phone number saved', 'error'); return; }
  ensureModalRoot();
  const root = document.getElementById('modalRoot');
  const wrap = document.createElement('div');
  wrap.className = 'modal-overlay show';
  wrap.innerHTML = `
    <div class="modal modal-lg">
      <div class="modal-head">
        <h3>${ICONS.whatsapp} Message ${targets.length} Customer(s)</h3>
        <button class="modal-close" id="bmClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="field-row">
          <label>Message Type</label>
          <select id="bmType">
            <option value="offer">Special Offer / Discount</option>
            <option value="product">New Product Announcement</option>
            <option value="custom">Custom Message</option>
          </select>
        </div>
        <div class="chan-choice">
          <label><input type="radio" name="bmChan" value="whatsapp" checked><span>${ICONS.whatsapp} WhatsApp</span></label>
          <label><input type="radio" name="bmChan" value="sms"><span>${ICONS.sms} SMS</span></label>
          <label><input type="radio" name="bmChan" value="both"><span>${ICONS.whatsapp}+${ICONS.sms} Both</span></label>
        </div>
        <div class="field-row">
          <label>Message</label>
          <textarea id="bmMessage" rows="4" placeholder="e.g. 20% off all beverages this weekend only!"></textarea>
          <div class="msg-tpl-vars">Variables auto-filled per customer: <b>{name}</b> <b>{store}</b></div>
        </div>
        <div class="divider"></div>
        <p class="text-muted" style="font-size:12px;">Sending to ${targets.length} customer(s): ${targets.map(t=>escapeHtml(t.name)).join(', ')}</p>
        <p class="text-muted" style="font-size:11.5px;margin-top:6px;">Write your message once and click "Send to All" below — a WhatsApp chat opens for each customer in turn, pre-filled and ready. Allow pop-ups for this site if your browser asks. "Both" sends WhatsApp and SMS to every selected customer.</p>
      </div>
      <div class="modal-foot">
        <button class="btn btn-outline" id="bmCancel">Cancel</button>
        <button class="btn btn-primary" id="bmSend">Send to All (${targets.length})</button>
      </div>
    </div>
  `;
  root.appendChild(wrap);
  const close = () => wrap.remove();
  document.getElementById('bmClose').onclick = close;
  document.getElementById('bmCancel').onclick = close;
  wrap.onclick = (e)=>{ if(e.target===wrap) close(); };

  document.getElementById('bmSend').onclick = () => {
    const type = document.getElementById('bmType').value;
    const channel = wrap.querySelector('input[name="bmChan"]:checked').value;
    const rawMsg = document.getElementById('bmMessage').value.trim();
    if(!rawMsg){ toast('Enter a message to send', 'error'); return; }
    targets.forEach((c, i)=>{
      const text = rawMsg.replace(/\{name\}/g, c.name).replace(/\{store\}/g, SETTINGS.storeName);
      const baseDelay = i * 500;
      if(channel === 'whatsapp' || channel === 'both'){
        setTimeout(()=>{
          window.open(`https://wa.me/${normalizePhone(c.phone)}?text=${encodeURIComponent(text)}`, '_blank');
        }, baseDelay);
      }
      if(channel === 'sms' || channel === 'both'){
        setTimeout(()=>{
          window.open(`sms:${c.phone.trim()}?body=${encodeURIComponent(text)}`, '_blank');
        }, baseDelay + (channel==='both' ? 300 : 0));
      }
    });
    const label = channel === 'both' ? 'WhatsApp and SMS' : (channel === 'whatsapp' ? 'WhatsApp' : 'SMS');
    toast(`Opening ${label} for ${targets.length} customer(s)`, 'success');
    selectedCustomerIds = new Set();
    customersTableSearch = '';
    const cts = document.getElementById('customerTableSearch'); if(cts) cts.value = '';
    renderCustomersTable();
    close();
  };
}

/* ============================================================

   ============================================================ */
function filteredSales(){
  let list = SALES.slice();
  if(historyFilter.from){
    list = list.filter(s => new Date(s.timestamp) >= new Date(historyFilter.from + 'T00:00:00'));
  }
  if(historyFilter.to){
    list = list.filter(s => new Date(s.timestamp) <= new Date(historyFilter.to + 'T23:59:59'));
  }
  if(historyFilter.q){
    const q = historyFilter.q.toLowerCase();
    list = list.filter(s => s.id.toLowerCase().includes(q) ||
      s.customerName.toLowerCase().includes(q) ||
      s.items.some(it=>it.name.toLowerCase().includes(q)));
  }
  return list;
}

function handleImportJson(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try{
      const data = JSON.parse(ev.target.result);
      const incoming = Array.isArray(data) ? data : (data.sales || []);
      if(!Array.isArray(incoming) || !incoming.length){ toast('No valid sales found in file', 'error'); return; }
      let added = 0;
      incoming.forEach(s=>{
        if(s && s.id && !SALES.find(x=>x.id===s.id)){ SALES.unshift(s); added++; }
      });
      saveSales();
      renderSalesTable();
      toast(`Imported ${added} transaction(s)`, 'success');
    }catch(err){
      toast('Invalid JSON file', 'error');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

/* ============================================================
   MEDIA — BACKGROUND MUSIC & VIDEO (local only — not synced to the cloud)
   Music keeps playing across every screen because the <audio>
   element lives outside #app in the static page body, so it is
   never touched by view switches or shell re-renders.

   File LOCATIONS are remembered across closing/reopening this app
   using the File System Access API (Chrome/Edge): we store a
   FileSystemFileHandle per track in IndexedDB, then re-open the
   same files next time instead of asking you to re-pick them.
   Browsers require your permission to be re-confirmed sometimes —
   when that happens a "Reconnect Files" button appears.
   In browsers without this API (e.g. Firefox, Safari) files are
   picked the old way and can't be remembered between sessions.
   ============================================================ */
let MEDIA = {
  tracks: [],        // [{id, name, url, handle?}] — url is a local blob: URL, valid only for this tab/session
  currentIndex: -1,
  shuffle: false,
  repeat: false,
  volume: 0.8,
  pendingHandles: []  // tracks whose stored handle needs permission re-granted
};
let MEDIA_VIDEO = { name: '', url: '', handle: null, pendingHandle: null };
let MEDIA_VIDEOS = [];         // [{id, name, url, handle}] — the video playlist
let currentVideoIndex = -1;
let pendingVideoHandles = [];  // videos whose stored handle needs permission re-granted
let mediaLastNotifiedTrackId = null;
let VIDEO_PREFS = { volume: 1, muted: false, speed: 1, shuffle: false, repeat: false };
const K_VIDEO_PREFS = 'gth_pos_video_prefs';
function saveVideoPrefs(){ try{ localStorage.setItem(K_VIDEO_PREFS, JSON.stringify(VIDEO_PREFS)); }catch(e){} }
function loadVideoPrefs(){
  try{
    const raw = localStorage.getItem(K_VIDEO_PREFS);
    if(raw) VIDEO_PREFS = { ...VIDEO_PREFS, ...JSON.parse(raw) };
  }catch(e){}
}

const K_MEDIA_PREFS = 'gth_pos_media_prefs';
const MEDIA_DB_NAME = 'gth_pos_media_db';
const MEDIA_DB_TRACKS_STORE = 'trackHandles';
const MEDIA_DB_VIDEO_STORE = 'videoHandle';
const MEDIA_DB_VIDEOS_STORE = 'videoTracks';

function fsAccessSupported(){
  return typeof window.showOpenFilePicker === 'function' && typeof window.showDirectoryPicker === 'function';
}

/* ---- Tiny IndexedDB helpers (stores FileSystemHandles so files can be reopened next session) ---- */
let mediaDbPromise = null;
function openMediaDB(){
  if(mediaDbPromise) return mediaDbPromise;
  mediaDbPromise = new Promise((resolve)=>{
    if(!('indexedDB' in window)){ resolve(null); return; }
const req = indexedDB.open(MEDIA_DB_NAME, 2);
    req.onupgradeneeded = () => {
      const db = req.result;
      if(!db.objectStoreNames.contains(MEDIA_DB_TRACKS_STORE)) db.createObjectStore(MEDIA_DB_TRACKS_STORE, {keyPath:'id'});
      if(!db.objectStoreNames.contains(MEDIA_DB_VIDEO_STORE)) db.createObjectStore(MEDIA_DB_VIDEO_STORE, {keyPath:'id'});
      if(!db.objectStoreNames.contains(MEDIA_DB_VIDEOS_STORE)) db.createObjectStore(MEDIA_DB_VIDEOS_STORE, {keyPath:'id'});
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => resolve(null);
  });
  return mediaDbPromise;
}
async function mediaDbPutTrack(record){
  const db = await openMediaDB(); if(!db) return;
  return new Promise((resolve)=>{
    const tx = db.transaction(MEDIA_DB_TRACKS_STORE, 'readwrite');
    tx.objectStore(MEDIA_DB_TRACKS_STORE).put(record);
    tx.oncomplete = () => resolve(); tx.onerror = () => resolve();
  });
}
async function mediaDbDeleteTrack(id){
  const db = await openMediaDB(); if(!db) return;
  return new Promise((resolve)=>{
    const tx = db.transaction(MEDIA_DB_TRACKS_STORE, 'readwrite');
    tx.objectStore(MEDIA_DB_TRACKS_STORE).delete(id);
    tx.oncomplete = () => resolve(); tx.onerror = () => resolve();
  });
}
async function mediaDbGetAllTracks(){
  const db = await openMediaDB(); if(!db) return [];
  return new Promise((resolve)=>{
    const tx = db.transaction(MEDIA_DB_TRACKS_STORE, 'readonly');
    const req = tx.objectStore(MEDIA_DB_TRACKS_STORE).getAll();
    req.onsuccess = () => resolve(req.result || []); req.onerror = () => resolve([]);
  });
}
async function mediaDbClearTracks(){
  const db = await openMediaDB(); if(!db) return;
  return new Promise((resolve)=>{
    const tx = db.transaction(MEDIA_DB_TRACKS_STORE, 'readwrite');
    tx.objectStore(MEDIA_DB_TRACKS_STORE).clear();
    tx.oncomplete = () => resolve(); tx.onerror = () => resolve();
  });
}
async function mediaDbPutVideo(record){
  const db = await openMediaDB(); if(!db) return;
  return new Promise((resolve)=>{
    const tx = db.transaction(MEDIA_DB_VIDEO_STORE, 'readwrite');
    tx.objectStore(MEDIA_DB_VIDEO_STORE).put(record);
    tx.oncomplete = () => resolve(); tx.onerror = () => resolve();
  });
}
async function mediaDbGetVideo(){
  const db = await openMediaDB(); if(!db) return null;
  return new Promise((resolve)=>{
    const tx = db.transaction(MEDIA_DB_VIDEO_STORE, 'readonly');
    const req = tx.objectStore(MEDIA_DB_VIDEO_STORE).get('video');
    req.onsuccess = () => resolve(req.result || null); req.onerror = () => resolve(null);
  });
}
async function mediaDbPutVideoTrack(record){
  const db = await openMediaDB(); if(!db) return;
  return new Promise((resolve)=>{
    const tx = db.transaction(MEDIA_DB_VIDEOS_STORE, 'readwrite');
    tx.objectStore(MEDIA_DB_VIDEOS_STORE).put(record);
    tx.oncomplete = () => resolve(); tx.onerror = () => resolve();
  });
}
async function mediaDbDeleteVideoTrack(id){
  const db = await openMediaDB(); if(!db) return;
  return new Promise((resolve)=>{
    const tx = db.transaction(MEDIA_DB_VIDEOS_STORE, 'readwrite');
    tx.objectStore(MEDIA_DB_VIDEOS_STORE).delete(id);
    tx.oncomplete = () => resolve(); tx.onerror = () => resolve();
  });
}
async function mediaDbGetAllVideoTracks(){
  const db = await openMediaDB(); if(!db) return [];
  return new Promise((resolve)=>{
    const tx = db.transaction(MEDIA_DB_VIDEOS_STORE, 'readonly');
    const req = tx.objectStore(MEDIA_DB_VIDEOS_STORE).getAll();
    req.onsuccess = () => resolve(req.result || []); req.onerror = () => resolve([]);
  });
}
async function mediaDbClearVideoTracks(){
  const db = await openMediaDB(); if(!db) return;
  return new Promise((resolve)=>{
    const tx = db.transaction(MEDIA_DB_VIDEOS_STORE, 'readwrite');
    tx.objectStore(MEDIA_DB_VIDEOS_STORE).clear();
    tx.oncomplete = () => resolve(); tx.onerror = () => resolve();
  });
}
async function persistVideoOrder(){
  for(let i=0;i<MEDIA_VIDEOS.length;i++){
    const v = MEDIA_VIDEOS[i];
    if(v.handle){ try{ await mediaDbPutVideoTrack({ id:v.id, name:v.name, handle:v.handle, order:i }); }catch(e){} }
  }
}
function syncMediaVideoLegacyMirror(){
  const v = currentVideoIndex>=0 ? MEDIA_VIDEOS[currentVideoIndex] : null;
  MEDIA_VIDEO = v ? { name: v.name, url: v.url, handle: v.handle, pendingHandle: null }
                  : { name: '', url: '', handle: null, pendingHandle: pendingVideoHandles[0] || null };
}
async function persistMediaOrder(){
  for(let i=0;i<MEDIA.tracks.length;i++){
    const t = MEDIA.tracks[i];
    if(t.handle){ try{ await mediaDbPutTrack({ id:t.id, name:t.name, handle:t.handle, order:i }); }catch(e){} }
  }
}
function saveMediaPrefs(){
  try{
    const currentId = mediaCurrentTrack() ? mediaCurrentTrack().id : null;
    localStorage.setItem(K_MEDIA_PREFS, JSON.stringify({ shuffle: MEDIA.shuffle, repeat: MEDIA.repeat, volume: MEDIA.volume, currentId }));
  }catch(e){}
}
function loadMediaPrefs(){
  try{ const raw = localStorage.getItem(K_MEDIA_PREFS); return raw ? JSON.parse(raw) : null; }catch(e){ return null; }
}

/* Recursively collect audio file handles from a picked folder */
async function walkDirectoryForAudio(dirHandle, results){
  for await (const [name, handle] of dirHandle.entries()){
    if(handle.kind === 'file'){
      if(/\.(mp3|wav|ogg|m4a|flac|aac|opus|webm)$/i.test(name)) results.push({ name, handle });
    } else if(handle.kind === 'directory'){
      await walkDirectoryForAudio(handle, results);
    }
  }
}
async function walkDirectoryForVideo(dirHandle, results){
  for await (const [name, handle] of dirHandle.entries()){
    if(handle.kind === 'file'){
      if(/\.(mp4|webm|mov|mkv|avi|m4v)$/i.test(name)) results.push({ name, handle });
    } else if(handle.kind === 'directory'){
      await walkDirectoryForVideo(handle, results);
    }
  }
}

/* Restore the playlist, video, and preferences on startup */
async function restoreMediaLibrary(){
  loadVideoPrefs();
  try{
    const records = await mediaDbGetAllTracks();
    records.sort((a,b)=>(a.order||0)-(b.order||0));
    const pending = [];
    for(const rec of records){
      try{
        const perm = await rec.handle.queryPermission({ mode:'read' });
        if(perm === 'granted'){
          const file = await rec.handle.getFile();
          MEDIA.tracks.push({ id: rec.id, name: rec.name, url: URL.createObjectURL(file), handle: rec.handle });
        } else {
          pending.push(rec);
        }
      }catch(e){ pending.push(rec); }
    }
    MEDIA.pendingHandles = pending;
  }catch(e){}

  const prefs = loadMediaPrefs();
  if(prefs){
    MEDIA.shuffle = !!prefs.shuffle;
    MEDIA.repeat = !!prefs.repeat;
    MEDIA.volume = typeof prefs.volume === 'number' ? prefs.volume : 0.8;
    if(prefs.currentId){
      const idx = MEDIA.tracks.findIndex(t=>t.id===prefs.currentId);
      MEDIA.currentIndex = idx>=0 ? idx : (MEDIA.tracks.length ? 0 : -1);
    } else if(MEDIA.tracks.length){
      MEDIA.currentIndex = 0;
    }
  } else if(MEDIA.tracks.length){
    MEDIA.currentIndex = 0;
  }
  initBgAudioEvents();
  const audio = getBgAudio();
  if(audio) audio.volume = MEDIA.volume;

try{
    const vrecords = await mediaDbGetAllVideoTracks();
    vrecords.sort((a,b)=>(a.order||0)-(b.order||0));
    const pendingV = [];
    for(const rec of vrecords){
      try{
        const perm = await rec.handle.queryPermission({ mode:'read' });
        if(perm === 'granted'){
          const file = await rec.handle.getFile();
          MEDIA_VIDEOS.push({ id: rec.id, name: rec.name, url: URL.createObjectURL(file), handle: rec.handle });
        } else {
          pendingV.push(rec);
        }
      }catch(e){ pendingV.push(rec); }
    }
    pendingVideoHandles = pendingV;

    // One-time migration: pick up a video saved by the old single-video system
    const legacy = await mediaDbGetVideo();
    if(legacy && legacy.handle && !MEDIA_VIDEOS.some(v=>v.name===legacy.name)){
      try{
        const perm = await legacy.handle.queryPermission({ mode:'read' });
        if(perm === 'granted'){
          const file = await legacy.handle.getFile();
          const id = uid('VID-');
          MEDIA_VIDEOS.push({ id, name: legacy.name, url: URL.createObjectURL(file), handle: legacy.handle });
          mediaDbPutVideoTrack({ id, name: legacy.name, handle: legacy.handle, order: MEDIA_VIDEOS.length-1 });
        } else if(!pendingVideoHandles.some(p=>p.name===legacy.name)){
          pendingVideoHandles.push({ id: uid('VID-'), name: legacy.name, handle: legacy.handle });
        }
      }catch(e){}
    }

    if(MEDIA_VIDEOS.length) currentVideoIndex = 0;
    syncMediaVideoLegacyMirror();
  }catch(e){}

  if(currentView === 'media') renderMediaView();
  renderTopbarMedia();
}

function getBgAudio(){ return document.getElementById('bgAudioPlayer'); }
function mediaCurrentTrack(){ return MEDIA.currentIndex>=0 ? MEDIA.tracks[MEDIA.currentIndex] : null; }

function initBgAudioEvents(){
  const audio = getBgAudio();
  if(!audio || audio.dataset.wired) return;
  audio.dataset.wired = '1';
  audio.volume = MEDIA.volume;
  audio.addEventListener('ended', () => mediaPlayNext(true));
  audio.addEventListener('timeupdate', ()=>{ renderMediaProgressIfVisible(); syncFloatingAudioProgress(); });
  audio.addEventListener('play', ()=>{ renderMediaPlayStateIfVisible(); renderTopbarMedia(); syncFloatingPlayerButtons(); });
  audio.addEventListener('pause', ()=>{ renderMediaPlayStateIfVisible(); renderTopbarMedia(); syncFloatingPlayerButtons(); });
}

/* File-picker entry points: use the File System Access API (remembers file
   locations) when the browser supports it, otherwise fall back to a plain
   <input type="file"> (works everywhere, but can't be remembered). */
async function mediaPickFiles(){
  if(fsAccessSupported()){
    try{
      const handles = await window.showOpenFilePicker({
        multiple: true,
        types: [{ description:'Audio files', accept:{'audio/*':['.mp3','.wav','.ogg','.m4a','.flac','.aac','.opus']} }]
      });
      await mediaAddFromHandles(handles.map(h=>({handle:h})));
    }catch(e){ /* user cancelled the picker */ }
  } else {
    document.getElementById('mediaFilesInput').click();
  }
}
async function mediaPickFolder(){
  if(fsAccessSupported()){
    try{
      const dirHandle = await window.showDirectoryPicker();
      const found = [];
      await walkDirectoryForAudio(dirHandle, found);
      if(!found.length){ toast('No audio files found in that folder', 'error'); return; }
      await mediaAddFromHandles(found);
    }catch(e){ /* user cancelled the picker */ }
  } else {
    document.getElementById('mediaFolderInput').click();
  }
}
async function mediaAddFromHandles(items){
  let added = 0;
  for(const item of items){
    try{
      const file = await item.handle.getFile();
      if(!file.type.startsWith('audio/') && !/\.(mp3|wav|ogg|m4a|flac|aac|opus)$/i.test(file.name)) continue;
      const id = uid('TRK-');
      const name = (item.name || file.name).replace(/\.[^/.]+$/, '');
      MEDIA.tracks.push({ id, name, url: URL.createObjectURL(file), handle: item.handle });
      await mediaDbPutTrack({ id, name, handle: item.handle, order: MEDIA.tracks.length-1 });
      added++;
    }catch(e){ /* skip a file that couldn't be opened */ }
  }
  if(!added){ toast('No audio files could be added', 'error'); return; }
  if(MEDIA.currentIndex === -1 && MEDIA.tracks.length){ MEDIA.currentIndex = 0; }
  saveMediaPrefs();
  toast(`Added ${added} track(s) — their file locations are remembered for next time`, 'success');
  renderMediaView();
}
async function mediaReconnectPending(){
  const stillPending = [];
  for(const rec of (MEDIA.pendingHandles||[])){
    try{
      const perm = await rec.handle.requestPermission({ mode:'read' });
      if(perm === 'granted'){
        const file = await rec.handle.getFile();
        MEDIA.tracks.push({ id: rec.id, name: rec.name, url: URL.createObjectURL(file), handle: rec.handle });
      } else { stillPending.push(rec); }
    }catch(e){ stillPending.push(rec); }
  }
  MEDIA.pendingHandles = stillPending;
  if(MEDIA.currentIndex === -1 && MEDIA.tracks.length) MEDIA.currentIndex = 0;
  toast(stillPending.length ? `Reconnected some tracks — ${stillPending.length} still need access` : 'All tracks reconnected', stillPending.length?'info':'success');
  renderMediaView();
}

/* Fallback path for browsers without the File System Access API — files can't be remembered */
function mediaAddFiles(fileList){
  const files = Array.from(fileList).filter(f=>f.type.startsWith('audio/'));
  if(!files.length){ toast('No audio files found in your selection', 'error'); return; }
  files.forEach(f=>{
    MEDIA.tracks.push({ id: uid('TRK-'), name: f.name.replace(/\.[^/.]+$/, ''), url: URL.createObjectURL(f) });
  });
  if(MEDIA.currentIndex === -1 && MEDIA.tracks.length){ MEDIA.currentIndex = 0; }
  saveMediaPrefs();
  toast(`Added ${files.length} track(s) — this browser can't remember file locations, so you'll need to re-add them next time`, 'success');
  renderMediaView();
}

function mediaRemoveTrack(id){
  const idx = MEDIA.tracks.findIndex(t=>t.id===id);
  if(idx===-1) return;
  const wasCurrent = idx === MEDIA.currentIndex;
  MEDIA.tracks.splice(idx,1);
  mediaDbDeleteTrack(id);
  if(wasCurrent){
    const audio = getBgAudio();
    if(audio){ audio.pause(); audio.removeAttribute('src'); }
    MEDIA.currentIndex = MEDIA.tracks.length ? Math.min(idx, MEDIA.tracks.length-1) : -1;
  } else if(MEDIA.currentIndex > idx){
    MEDIA.currentIndex--;
  }
  persistMediaOrder();
  saveMediaPrefs();
  renderMediaView();
  renderTopbarMedia();
}

function mediaMoveTrack(id, dir){
  const idx = MEDIA.tracks.findIndex(t=>t.id===id);
  const newIdx = idx + dir;
  if(idx===-1 || newIdx<0 || newIdx>=MEDIA.tracks.length) return;
  const currentId = mediaCurrentTrack() ? mediaCurrentTrack().id : null;
  const [item] = MEDIA.tracks.splice(idx,1);
  MEDIA.tracks.splice(newIdx,0,item);
  if(currentId){ MEDIA.currentIndex = MEDIA.tracks.findIndex(t=>t.id===currentId); }
  persistMediaOrder();
  renderMediaView();
}

function mediaPlayTrack(index, opts){
  if(index<0 || index>=MEDIA.tracks.length) return;
  MEDIA.currentIndex = index;
  initBgAudioEvents();
  const audio = getBgAudio();
  audio.src = MEDIA.tracks[index].url;
  audio.play().catch(()=>{ toast('Tap play again — your browser blocked autoplay until you interact with the page', 'info'); });
  saveMediaPrefs();
  renderMediaView();
  renderTopbarMedia();
  syncFloatingPlayerVisibility();
  if(!opts || opts.notify !== false){
    showMediaNotify('music', MEDIA.tracks[index].name);
  }
}

function mediaTogglePlayPause(){
  const audio = getBgAudio();
  if(!audio) return;
  if(!mediaCurrentTrack()){
    if(MEDIA.tracks.length) mediaPlayTrack(0);
    return;
  }
  if(audio.paused){ audio.play().catch(()=>{}); } else { audio.pause(); }
  renderMediaView();
  renderTopbarMedia();
}

function mediaPlayNext(auto){
  if(!MEDIA.tracks.length) return;
  let nextIndex;
  if(MEDIA.shuffle){
    if(MEDIA.tracks.length===1){ nextIndex = 0; }
    else{ do{ nextIndex = Math.floor(Math.random()*MEDIA.tracks.length); } while(nextIndex===MEDIA.currentIndex); }
  } else {
    nextIndex = MEDIA.currentIndex + 1;
    if(nextIndex >= MEDIA.tracks.length){
      if(MEDIA.repeat){ nextIndex = 0; } else { renderMediaView(); return; }
    }
  }
  mediaPlayTrack(nextIndex);
}

function mediaPlayPrev(){
  if(!MEDIA.tracks.length) return;
  let prevIndex = MEDIA.currentIndex - 1;
  if(prevIndex < 0) prevIndex = MEDIA.repeat ? MEDIA.tracks.length-1 : 0;
  mediaPlayTrack(prevIndex);
}

function mediaSetVolume(v){
  MEDIA.volume = v;
  const audio = getBgAudio();
  if(audio) audio.volume = v;
  saveMediaPrefs();
}

function mediaFmtTime(sec){
  if(!isFinite(sec) || sec<0) sec = 0;
  const m = Math.floor(sec/60);
  const s = Math.floor(sec%60);
  return m + ':' + String(s).padStart(2,'0');
}

function renderMediaProgressIfVisible(){
  if(currentView !== 'media') return;
  const audio = getBgAudio();
  const seek = document.getElementById('mediaSeek');
  const cur = document.getElementById('mediaCurTime');
  const dur = document.getElementById('mediaDurTime');
  if(seek && audio && isFinite(audio.duration) && audio.duration>0){
    seek.max = 1000;
    seek.value = (audio.currentTime/audio.duration)*1000;
  }
  if(cur && audio) cur.textContent = mediaFmtTime(audio.currentTime);
  if(dur && audio) dur.textContent = mediaFmtTime(audio.duration);
}

function renderMediaPlayStateIfVisible(){
  if(currentView !== 'media') return;
  const audio = getBgAudio();
  const btn = document.getElementById('mediaPlayPauseBtn');
  if(btn && audio) btn.innerHTML = audio.paused ? '▶' : '⏸';

    }

}

function wireFloatingDrag(){
  const el = document.getElementById('floatingMediaPlayer');
  const handle = document.getElementById('fmpDrag');
  if(!el || !handle || handle.dataset.wired) return;
  handle.dataset.wired = '1';
  let startX, startY, origLeft, origTop;
  function onDown(e){
    floatingPlayerDragging = true;
    const point = e.touches ? e.touches[0] : e;
    startX = point.clientX; startY = point.clientY;
    origLeft = floatingPlayerPos.left; origTop = floatingPlayerPos.top;
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchmove', onMove, {passive:false});
    document.addEventListener('touchend', onUp);
  }
  function onMove(e){
    if(!floatingPlayerDragging) return;
    e.preventDefault();
    const point = e.touches ? e.touches[0] : e;
    const dx = point.clientX - startX; const dy = point.clientY - startY;
    floatingPlayerPos = { left: origLeft+dx, top: origTop+dy };
    el.style.left = Math.max(8, Math.min(floatingPlayerPos.left, window.innerWidth-60)) + 'px';
    el.style.top = Math.max(8, Math.min(floatingPlayerPos.top, window.innerHeight-60)) + 'px';
  }
  function onUp(){
    floatingPlayerDragging = false;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onUp);
  }
  handle.addEventListener('mousedown', onDown);
  handle.addEventListener('touchstart', onDown, {passive:true});
}

async function mediaPickVideoFiles(){
  if(fsAccessSupported()){
    try{
      const handles = await window.showOpenFilePicker({
        multiple: true,
        types: [{ description:'Video files', accept:{'video/*':['.mp4','.webm','.mov','.mkv','.avi','.m4v']} }]
      });
      await mediaAddVideoFromHandles(handles.map(h=>({handle:h})));
    }catch(e){ /* user cancelled the picker */ }
  } else {
    document.getElementById('mediaVideoInput').click();
  }
}
async function mediaPickVideoFolder(){
  if(fsAccessSupported()){
    try{
      const dirHandle = await window.showDirectoryPicker();
      const found = [];
      await walkDirectoryForVideo(dirHandle, found);
      if(!found.length){ toast('No video files found in that folder', 'error'); return; }
      await mediaAddVideoFromHandles(found);
    }catch(e){ /* user cancelled the picker */ }
  } else {
    document.getElementById('mediaVideoFolderInput').click();
  }
}
async function mediaAddVideoFromHandles(items){
  let added = 0;
  for(const item of items){
    try{
      const file = await item.handle.getFile();
      if(!file.type.startsWith('video/') && !/\.(mp4|webm|mov|mkv|avi|m4v)$/i.test(file.name)) continue;
      const id = uid('VID-');
      const name = (item.name || file.name).replace(/\.[^/.]+$/, '');
      MEDIA_VIDEOS.push({ id, name, url: URL.createObjectURL(file), handle: item.handle });
      await mediaDbPutVideoTrack({ id, name, handle: item.handle, order: MEDIA_VIDEOS.length-1 });
      added++;
    }catch(e){ /* skip a file that couldn't be opened */ }
  }
  if(!added){ toast('No video files could be added', 'error'); return; }
  if(currentVideoIndex === -1) currentVideoIndex = 0;
  syncMediaVideoLegacyMirror();
  toast(`Added ${added} video(s) — their file locations are remembered for next time`, 'success');
  renderMediaView();
}
function mediaAddVideoFiles(fileList){
  const files = Array.from(fileList).filter(f=>f.type.startsWith('video/'));
  if(!files.length){ toast('No video files found in your selection', 'error'); return; }
  files.forEach(f=>{
    MEDIA_VIDEOS.push({ id: uid('VID-'), name: f.name.replace(/\.[^/.]+$/, ''), url: URL.createObjectURL(f) });
  });
  if(currentVideoIndex === -1) currentVideoIndex = 0;
  syncMediaVideoLegacyMirror();
  toast(`Added ${files.length} video(s) — this browser can't remember file locations, so you'll need to re-add them next time`, 'success');
  renderMediaView();
}
function mediaPlayVideoTrack(index, opts){
  if(index<0 || index>=MEDIA_VIDEOS.length) return;
  currentVideoIndex = index;
  syncMediaVideoLegacyMirror();
  window.__videoResumeTime = 0;
  window.__videoAutoplay = !!(opts && opts.autoplay);
  showMediaNotify('video', MEDIA_VIDEOS[index].name);
  renderMediaView();
  syncFloatingPlayerVisibility();
}
function mediaVideoNext(){
  if(!MEDIA_VIDEOS.length) return;
  let nextIndex;
  if(VIDEO_PREFS.shuffle){
    if(MEDIA_VIDEOS.length===1){ nextIndex = 0; }
    else{ do{ nextIndex = Math.floor(Math.random()*MEDIA_VIDEOS.length); } while(nextIndex===currentVideoIndex); }
  } else {
    nextIndex = currentVideoIndex + 1;
    if(nextIndex >= MEDIA_VIDEOS.length){
      if(VIDEO_PREFS.repeat){ nextIndex = 0; } else { return; }
    }
  }
  mediaPlayVideoTrack(nextIndex, {autoplay:true});
}
function mediaVideoPrev(){
  if(!MEDIA_VIDEOS.length) return;
  let prevIndex = currentVideoIndex - 1;
  if(prevIndex < 0) prevIndex = VIDEO_PREFS.repeat ? MEDIA_VIDEOS.length-1 : 0;
  mediaPlayVideoTrack(prevIndex, {autoplay:true});
}
function mediaRemoveVideoTrack(id){
  const idx = MEDIA_VIDEOS.findIndex(v=>v.id===id);
  if(idx===-1) return;
  const wasCurrent = idx === currentVideoIndex;
  MEDIA_VIDEOS.splice(idx,1);
  mediaDbDeleteVideoTrack(id);
  if(wasCurrent){
    const vEl = document.getElementById('mediaVideoPlayer');
    if(vEl){ vEl.pause(); }
    currentVideoIndex = MEDIA_VIDEOS.length ? Math.min(idx, MEDIA_VIDEOS.length-1) : -1;
  } else if(currentVideoIndex > idx){
    currentVideoIndex--;
  }
  persistVideoOrder();
  syncMediaVideoLegacyMirror();
  renderMediaView();
}
function mediaMoveVideoTrack(id, dir){
  const idx = MEDIA_VIDEOS.findIndex(v=>v.id===id);
  const newIdx = idx + dir;
  if(idx===-1 || newIdx<0 || newIdx>=MEDIA_VIDEOS.length) return;
  const currentId = currentVideoIndex>=0 ? MEDIA_VIDEOS[currentVideoIndex].id : null;
  const [item] = MEDIA_VIDEOS.splice(idx,1);
  MEDIA_VIDEOS.splice(newIdx,0,item);
  if(currentId) currentVideoIndex = MEDIA_VIDEOS.findIndex(v=>v.id===currentId);
  persistVideoOrder();
  renderMediaView();
}
async function mediaReconnectPendingVideos(){
  const stillPending = [];
  for(const rec of (pendingVideoHandles||[])){
    try{
      const perm = await rec.handle.requestPermission({ mode:'read' });
      if(perm === 'granted'){
        const file = await rec.handle.getFile();
        MEDIA_VIDEOS.push({ id: rec.id, name: rec.name, url: URL.createObjectURL(file), handle: rec.handle });
      } else { stillPending.push(rec); }
    }catch(e){ stillPending.push(rec); }
  }
  pendingVideoHandles = stillPending;
  if(currentVideoIndex === -1 && MEDIA_VIDEOS.length) currentVideoIndex = 0;
  syncMediaVideoLegacyMirror();
  toast(stillPending.length ? `Reconnected some videos — ${stillPending.length} still need access` : 'All videos reconnected', stillPending.length?'info':'success');
  renderMediaView();
}

/* ---- Custom video player controls: timeline, play/prev/next, fullscreen ---- */
function wireVideoPlayer(){
  const video = document.getElementById('mediaVideoPlayer');
  const wrap = document.getElementById('videoPlayerWrap');
  if(!video || !wrap) return;

  if(window.__videoResumeTime){ try{ video.currentTime = window.__videoResumeTime; }catch(e){} }
  video.volume = VIDEO_PREFS.muted ? 0 : VIDEO_PREFS.volume;
  video.muted = VIDEO_PREFS.muted;
  video.playbackRate = VIDEO_PREFS.speed;

  const seek = document.getElementById('videoSeek');
  const playBtn = document.getElementById('vpPlayBtn');
  const fullBtn = document.getElementById('vpFullBtn');
  const curTime = document.getElementById('vpCurTime');
  const durTime = document.getElementById('vpDurTime');
  const muteBtn = document.getElementById('videoMuteBtn');
  const volumeSlider = document.getElementById('videoVolume');
  const speedSelect = document.getElementById('videoSpeed');
  const shuffleBtn = document.getElementById('videoShuffleBtn');
  const repeatBtn = document.getElementById('videoRepeatBtn');

  function syncPlayIcon(){ if(playBtn) playBtn.innerHTML = video.paused ? '▶' : '⏸'; }
  function syncTime(){
    if(isFinite(video.duration) && video.duration>0){
      seek.max = 1000;
      seek.value = (video.currentTime/video.duration)*1000;
      durTime.textContent = mediaFmtTime(video.duration);
    }
    curTime.textContent = mediaFmtTime(video.currentTime);
    window.__videoResumeTime = video.currentTime;
  }

  if(playBtn) playBtn.onclick = () => { if(video.paused){ video.play().catch(()=>{}); } else { video.pause(); } };
  seek.oninput = (e) => { if(isFinite(video.duration) && video.duration>0){ video.currentTime = (e.target.value/1000)*video.duration; } };
  fullBtn.onclick = () => {
    if(document.fullscreenElement){ document.exitFullscreen(); }
    else if(wrap.requestFullscreen){ wrap.requestFullscreen(); }
    else if(video.requestFullscreen){ video.requestFullscreen(); }
  };

  if(muteBtn) muteBtn.onclick = () => {
    VIDEO_PREFS.muted = !VIDEO_PREFS.muted;
    video.muted = VIDEO_PREFS.muted;
    saveVideoPrefs();
    renderMediaView();
  };
  if(volumeSlider) volumeSlider.oninput = (e) => {
    VIDEO_PREFS.volume = parseFloat(e.target.value);
    if(VIDEO_PREFS.volume > 0 && VIDEO_PREFS.muted){ VIDEO_PREFS.muted = false; video.muted = false; }
    video.volume = VIDEO_PREFS.volume;
    saveVideoPrefs();
  };
  if(speedSelect) speedSelect.onchange = (e) => {
    VIDEO_PREFS.speed = parseFloat(e.target.value);
    video.playbackRate = VIDEO_PREFS.speed;
    saveVideoPrefs();
  };
  if(shuffleBtn) shuffleBtn.onclick = () => { VIDEO_PREFS.shuffle = !VIDEO_PREFS.shuffle; saveVideoPrefs(); renderMediaView(); };
  if(repeatBtn) repeatBtn.onclick = () => { VIDEO_PREFS.repeat = !VIDEO_PREFS.repeat; saveVideoPrefs(); renderMediaView(); };

  video.addEventListener('play', () => {
    syncPlayIcon();
    const a = getBgAudio(); if(a && !a.paused) a.pause();
    wrap.classList.add('controls-visible');
    syncFloatingPlayerButtons();
  });
  video.addEventListener('pause', ()=>{ syncPlayIcon(); syncFloatingPlayerButtons(); });
  video.addEventListener('timeupdate', syncTime);
  video.addEventListener('loadedmetadata', syncTime);
  video.addEventListener('ended', ()=>{
    if(MEDIA_VIDEOS.length > 1 || VIDEO_PREFS.repeat){
      mediaVideoNext();
    } else {
      showMediaNotify('video', MEDIA_VIDEO.name + ' — finished');
    }
  });

  syncPlayIcon(); syncTime();

  if(window.__videoAutoplay){
    video.play().catch(()=>{});
    window.__videoAutoplay = false;
  }
}
function renderMediaPlaylist(){
  const wrap = document.getElementById('mediaPlaylist');
  if(!wrap) return;
  if(!MEDIA.tracks.length){
    wrap.innerHTML = `<div class="empty-state" style="padding:30px 10px;"><div class="ico">🎵</div><h3>No tracks yet</h3><p>Add music files or a whole folder to build a playlist.</p></div>`;
    return;
  }
  const audio = getBgAudio();
  wrap.innerHTML = MEDIA.tracks.map((t,i)=>`
    <div class="media-track-row ${i===MEDIA.currentIndex && audio && !audio.paused ? 'playing':''}" data-id="${t.id}" style="display:flex;align-items:center;gap:10px;padding:9px 6px;border-bottom:1px dashed var(--border);cursor:pointer;">
      <span class="media-track-marker" style="width:20px;text-align:center;font-size:12px;color:var(--muted);">${i===MEDIA.currentIndex ? (audio && !audio.paused ? '▶' : '⏸') : (i+1)}</span>
      <span style="flex:1;min-width:0;font-size:13px;font-weight:${i===MEDIA.currentIndex?'700':'500'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(t.name)}</span>
      <button class="btn-icon btn-ghost" data-act="up" title="Move up" style="width:26px;height:26px;">↑</button>
      <button class="btn-icon btn-ghost" data-act="down" title="Move down" style="width:26px;height:26px;">↓</button>
      <button class="btn-icon btn-ghost" data-act="remove" title="Remove" style="width:26px;height:26px;color:var(--danger);">✕</button>
    </div>
  `).join('');
  wrap.querySelectorAll('.media-track-row').forEach(row=>{
    const id = row.dataset.id;
    row.addEventListener('click', (e)=>{
      if(e.target.closest('button')) return;
      const idx = MEDIA.tracks.findIndex(t=>t.id===id);
      mediaPlayTrack(idx);
    });
    row.querySelector('[data-act="up"]').onclick = (e)=>{ e.stopPropagation(); mediaMoveTrack(id,-1); };
    row.querySelector('[data-act="down"]').onclick = (e)=>{ e.stopPropagation(); mediaMoveTrack(id,1); };
    row.querySelector('[data-act="remove"]').onclick = (e)=>{ e.stopPropagation(); mediaRemoveTrack(id); };
  });
}
function renderVideoPlaylist(){
  const wrap = document.getElementById('videoPlaylist');
  if(!wrap) return;
  if(!MEDIA_VIDEOS.length){ wrap.innerHTML = ''; return; }
  wrap.innerHTML = MEDIA_VIDEOS.map((v,i)=>`
    <div class="media-track-row ${i===currentVideoIndex?'playing':''}" data-id="${v.id}" style="display:flex;align-items:center;gap:10px;padding:9px 6px;border-bottom:1px dashed var(--border);cursor:pointer;">
      <span style="width:20px;text-align:center;font-size:12px;color:var(--muted);">${i===currentVideoIndex?'▶':(i+1)}</span>
      <span style="flex:1;min-width:0;font-size:13px;font-weight:${i===currentVideoIndex?'700':'500'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(v.name)}</span>
      <button class="btn-icon btn-ghost" data-act="up" title="Move up" style="width:26px;height:26px;">↑</button>
      <button class="btn-icon btn-ghost" data-act="down" title="Move down" style="width:26px;height:26px;">↓</button>
      <button class="btn-icon btn-ghost" data-act="remove" title="Remove" style="width:26px;height:26px;color:var(--danger);">✕</button>
    </div>
  `).join('');
  wrap.querySelectorAll('.media-track-row').forEach(row=>{
    const id = row.dataset.id;
row.addEventListener('click', (e)=>{
      if(e.target.closest('button')) return;
      mediaPlayVideoTrack(MEDIA_VIDEOS.findIndex(v=>v.id===id), {autoplay:true});
    });
    row.querySelector('[data-act="up"]').onclick = (e)=>{ e.stopPropagation(); mediaMoveVideoTrack(id,-1); };

function reportFilteredSales(){
  let list = SALES.slice();
  if(reportFilter.from) list = list.filter(s => new Date(s.timestamp) >= new Date(reportFilter.from + 'T00:00:00'));
  if(reportFilter.to) list = list.filter(s => new Date(s.timestamp) <= new Date(reportFilter.to + 'T23:59:59'));
  return list;
}

function renderReportsView(){
  const el = document.getElementById('viewReports');
  const outStock = PRODUCTS.filter(p=>p.qty<=0);
  const lowStock = PRODUCTS.filter(p=>p.qty>0 && p.qty<=SETTINGS.lowStockThreshold);

  const allTimeTotal = SALES.reduce((s,x)=>s+x.total,0);
  const allTimeCount = SALES.length;

  const rangeSales = reportFilteredSales();
  const rangeTotal = rangeSales.reduce((s,x)=>s+x.total,0);

  const byDay = {};
  rangeSales.forEach(s=>{
    const dayKey = new Date(s.timestamp).toISOString().slice(0,10);
    byDay[dayKey] = (byDay[dayKey]||0) + s.total;
  });
  const dayKeys = Object.keys(byDay).sort();
  const days = dayKeys.map(k=>[new Date(k).toLocaleDateString('en-GB',{day:'2-digit',month:'short'}), byDay[k]]);
  const maxDay = days.length ? Math.max(...days.map(d=>d[1]), 1) : 1;

  const catRevenue = {};
  rangeSales.forEach(s=>s.items.forEach(it=>{
    const prod = PRODUCTS.find(p=>p.id===it.productId);
    const cat = prod ? (prod.category||'Uncategorized') : 'Uncategorized';
    catRevenue[cat] = (catRevenue[cat]||0) + it.lineTotal;
  }));

  // Build an SVG line chart from the day/value pairs
  let lineChartSvg = '';
  if(days.length){
    const W = 640, H = 180, padX = 30, padY = 20;
    const stepX = days.length>1 ? (W-padX*2)/(days.length-1) : 0;
    const points = days.map(([,val],i)=>{
      const x = padX + i*stepX;
      const y = H - padY - (val/maxDay)*(H-padY*2);
      return [x,y];
    });
    const pointsAttr = points.map(p=>p.join(',')).join(' ');
    const areaAttr = `${padX},${H-padY} ` + pointsAttr + ` ${padX + (days.length-1)*stepX},${H-padY}`;
    const dots = points.map(([x,y],i)=>`<circle cx="${x}" cy="${y}" r="3.5" fill="var(--orange-dark)"><title>${days[i][0]}: ${fmtMoney(days[i][1])}</title></circle>`).join('');
    const labels = days.map(([day],i)=>{
      if(days.length>10 && i%Math.ceil(days.length/10)!==0) return '';
      const x = padX + i*stepX;
      return `<text x="${x}" y="${H-2}" font-size="10" fill="var(--muted)" text-anchor="middle">${day}</text>`;
    }).join('');
    lineChartSvg = `
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:180px;overflow:visible;">
        <polygon points="${areaAttr}" fill="var(--orange)" opacity="0.12"></polygon>
        <polyline points="${pointsAttr}" fill="none" stroke="var(--orange-dark)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"></polyline>
        ${dots}
        ${labels}
      </svg>`;
  }

  el.innerHTML = `
    <div class="section-head"><div><h1>Reports</h1><p>Business insights at a glance</p></div></div>

    <div class="stat-grid" style="grid-template-columns:repeat(2,1fr);">
      <div class="stat-card"><div class="stat-ico" style="background:var(--orange-light);color:var(--orange-dark);">💰</div>
        <div class="stat-info"><b>${fmtMoney(allTimeTotal)}</b><span>All-Time Total Sales (${allTimeCount} transactions)</span></div></div>
      <div class="stat-card"><div class="stat-ico" style="background:rgba(47,128,237,0.12);color:var(--info);">📅</div>
        <div class="stat-info"><b>${fmtMoney(rangeTotal)}</b><span>Total for Selected Range (${rangeSales.length} transactions)</span></div></div>
    </div>

    <div class="card" style="padding:20px;margin-bottom:16px;">
      <div class="flex gap-8 items-center" style="flex-wrap:wrap;">
        <label class="text-muted" style="font-size:12.5px;font-weight:700;">Date range:</label>
        <input type="date" id="repFrom" class="hist-input" value="${reportFilter.from}">
        <span class="text-muted">to</span>
        <input type="date" id="repTo" class="hist-input" value="${reportFilter.to}">
        <button class="btn btn-outline btn-sm" id="repClearBtn">Clear (All Time)</button>
      </div>
    </div>

    <div class="form-grid" style="grid-template-columns: 1.4fr 1fr;">
      <div class="card" style="padding:20px;">
        <h3 style="font-family:var(--font-display);font-size:15px;margin-bottom:16px;">Revenue Trend</h3>
        ${days.length ? lineChartSvg : `<p class="text-muted" style="font-size:13px;">Not enough data yet for this range.</p>`}
      </div>
      <div class="card" style="padding:20px;">
        <h3 style="font-family:var(--font-display);font-size:15px;margin-bottom:14px;">Revenue by Category</h3>
        ${Object.keys(catRevenue).length ? Object.entries(catRevenue).sort((a,b)=>b[1]-a[1]).map(([cat,val])=>{
          const totalRev = Object.values(catRevenue).reduce((a,b)=>a+b,0);
          const pct = totalRev ? (val/totalRev*100) : 0;
          return `<div style="margin-bottom:10px;">
            <div class="flex" style="justify-content:space-between;font-size:12px;margin-bottom:4px;"><span>${escapeHtml(cat)}</span><b>${fmtMoney(val)}</b></div>
            <div style="background:var(--bg);border-radius:20px;height:7px;overflow:hidden;"><div style="width:${pct}%;height:100%;background:var(--info);"></div></div>
          </div>`;
        }).join('') : `<p class="text-muted" style="font-size:13px;">No sales in this range.</p>`}
      </div>
    </div>

    <div class="card mt-16" style="padding:20px;">
      <h3 style="font-family:var(--font-display);font-size:15px;margin-bottom:14px;">⚠️ Stock Alerts (${outStock.length+lowStock.length})</h3>
      ${(outStock.length+lowStock.length) ? `
        <div class="low-stock-list">
          ${outStock.map(p=>`<div class="low-stock-item"><span>${escapeHtml(p.name)} <span class="text-muted">(${p.id})</span></span><span class="badge badge-danger">Out of stock</span></div>`).join('')}
          ${lowStock.map(p=>`<div class="low-stock-item"><span>${escapeHtml(p.name)} <span class="text-muted">(${p.id})</span></span><span class="badge badge-warning">${p.qty} left</span></div>`).join('')}
        </div>
      ` : `<p class="text-muted" style="font-size:13px;">Everything is well stocked 🎉</p>`}
    </div>
  `;

  document.getElementById('repFrom').onchange = (e)=>{ reportFilter.from = e.target.value; renderReportsView(); };
  document.getElementById('repTo').onchange = (e)=>{ reportFilter.to = e.target.value; renderReportsView(); };
  document.getElementById('repClearBtn').onclick = () => { reportFilter = {from:'', to:''}; renderReportsView(); };
}

        <h3 style="font-family:var(--font-display);font-size:15px;margin-bottom:14px;">Store Details</h3>
        <div class="img-drop" id="logoDrop" style="margin-bottom:14px;">
          <img class="preview" id="logoPreview" src="${SETTINGS.storeLogo||''}" style="${SETTINGS.storeLogo?'display:block;':''}">
          <div class="ph-ico" id="logoPh" style="${SETTINGS.storeLogo?'display:none;':''}">${ICONS.image}</div>
          <small id="logoLabel">${SETTINGS.storeLogo?'Click to change logo':'Click to upload a store logo (optional)'}</small>
          <input type="file" id="logoInput" accept="image/*">
        </div>
        ${SETTINGS.storeLogo ? `<button class="btn btn-outline btn-sm mb-16" id="removeLogoBtn">Remove Logo</button>` : ''}
