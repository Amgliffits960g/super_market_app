/* ============================================================
   GLIFFITS MART POS — DESIGN TOKENS
   ============================================================ */
:root{
  --orange: #F68B1E;
  --orange-dark: #E07800;
  --orange-light: #FFF1DE;
  --charcoal: #1E2129;
  --charcoal-2: #2A2E38;
  --charcoal-3: #363B47;
  --ink: #1E2129;
  --bg: #F3F4F8;
  --card: #FFFFFF;
  --text: #1E2129;
  --muted: #767C8C;
  --border: #E7E8EE;
  --success: #1DB954;
  --success-dark: #159144;
  --danger: #E1493A;
  --danger-dark: #C43226;
  --warning: #F5A623;
  --info: #2F80ED;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow-sm: 0 1px 3px rgba(30,33,41,0.08);
  --shadow-md: 0 6px 20px rgba(30,33,41,0.10);
  --shadow-lg: 0 20px 50px rgba(30,33,41,0.22);
  --font-display: 'Poppins', 'Segoe UI', Arial, sans-serif;
  --font-body: 'Inter', 'Segoe UI', Arial, sans-serif;
  --font-mono: 'Courier New', Courier, monospace;
  --sidebar-w: 220px;
  --sidebar-w-collapsed: 76px;
  --topbar-h: 68px;
  --zf: 1;   /* ← ADD THIS — current zoom factor, e.g. 0.7 for 70% */
}

[data-theme="dark"]{

}
[data-theme="light"]{ color-scheme: light; }

*{ box-sizing: border-box; margin:0; padding:0; }
html,body{ height:100%; }
body{
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  transition: background .2s ease, color .2s ease;
}
img{ max-width:100%; display:block; }
button{ font-family: inherit; cursor:pointer; border:none; background:none; }
input, select, textarea{ font-family: inherit; }
ul{ list-style:none; }
a{ color:inherit; text-decoration:none; }
::-webkit-scrollbar{ width:8px; height:8px; }
::-webkit-scrollbar-track{ background:transparent; }
::-webkit-scrollbar-thumb{ background:#D2D4DE; border-radius:8px; }
::-webkit-scrollbar-thumb:hover{ background:var(--orange); }

@media (prefers-reduced-motion: reduce){
  *{ animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; }
}

:focus-visible{ outline: 2px solid var(--orange); outline-offset: 2px; }

/* ============================================================
   APP SHELL
   ============================================================ */
#app{ display:flex; min-height:100vh; }

/* ---- Sidebar ---- */
.sidebar{
  width: var(--sidebar-w);
  background: linear-gradient(180deg, var(--charcoal) 0%, #14161C 100%);
  color:#fff;
  display:flex;
  flex-direction:column;
  position:fixed;
  top:0; left:0; bottom:0;
  z-index:200;
  transition: transform 0.3s ease;
}
.sidebar-brand{
  display:flex; align-items:center; gap:10px;
  padding: 20px 18px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.sidebar-brand .mark{
  width:38px; height:38px; border-radius:10px;
  background: linear-gradient(135deg, var(--orange), var(--orange-dark));
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-weight:800; color:#fff; font-size:18px;
  box-shadow: 0 4px 12px rgba(246,139,30,0.4);
  flex-shrink:0;
}
.sidebar-brand .name{
  font-family:var(--font-display); font-weight:700; font-size:16px; line-height:1.15;
}
.sidebar-brand .name small{ display:block; font-family:var(--font-body); font-weight:400; font-size:11px; color:#9AA0AF; letter-spacing:0.5px; text-transform:uppercase; margin-top:2px;}

.sidebar-nav{ flex:1; padding: 14px 10px; overflow-y:auto; }
.sidebar-nav .nav-item{
  display:flex; align-items:center; gap:12px;
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  color:#B7BBC7;
  font-size:14px; font-weight:600;
  cursor:pointer;
  margin-bottom:4px;
  position:relative;
  transition: background 0.18s ease, color 0.18s ease, transform 0.18s ease;
}
.sidebar-nav .nav-item .ico{ width:20px; height:20px; flex-shrink:0; opacity:0.85;}
.sidebar-nav .nav-item:hover{ background: rgba(255,255,255,0.06); color:#fff; transform: translateX(2px); }
.sidebar-nav .nav-item.active{ background: var(--orange); color:#fff; box-shadow: 0 4px 14px rgba(246,139,30,0.35); }
.sidebar-nav .nav-item.active .ico{ opacity:1; }
.sidebar-nav .nav-item .badge-count{
  margin-left:auto; background:rgba(255,255,255,0.15); font-size:11px; padding:2px 7px; border-radius:20px;
}
.sidebar-nav .nav-section-label{
  font-size:10px; text-transform:uppercase; letter-spacing:1px; color:#666C7C; font-weight:700;
  padding: 16px 14px 6px;
}
.sidebar-foot{
  padding: 14px 18px 18px;
  border-top: 1px solid rgba(255,255,255,0.08);
  font-size:11px; color:#6E7382;
}
.sidebar-foot b{ color:#9AA0AF; }

.sidebar-close{ display:none; }

/* ---- Sidebar collapsed (desktop) ---- */
.sidebar.collapsed{ width: var(--sidebar-w-collapsed); }
.sidebar.collapsed .sidebar-brand .name,
.sidebar.collapsed .sidebar-nav .nav-item span:not(.badge-count),
.sidebar.collapsed .sidebar-nav .nav-section-label,
.sidebar.collapsed .sidebar-foot{ display:none; }
.sidebar.collapsed .sidebar-brand{ justify-content:center; padding:20px 10px; }
.sidebar.collapsed .nav-item{ justify-content:center; padding:12px; }
.main-wrap.collapsed{ margin-left: var(--sidebar-w-collapsed); }
.sidebar-collapse-btn{
  width:38px; height:38px; border-radius:var(--radius-sm); background:var(--bg);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  transition: background .18s ease, transform .18s ease;
}
.sidebar-collapse-btn:hover{ background:var(--orange-light); }
.sidebar-collapse-btn svg{ transition: transform .25s ease; }
.sidebar.collapsed ~ .main-wrap .sidebar-collapse-btn svg{ transform: rotate(180deg); }
@media (max-width:860px){ .main-wrap.collapsed{ margin-left:0; } }

/* ============================================================
   LOGIN / APP LOCK GATE (full screen)
   ============================================================ */
#lockGate{
  position:fixed; inset:0; z-index:5000; display:flex; align-items:center; justify-content:center;
  background: radial-gradient(circle at 20% 15%, #2A2E38 0%, #14161C 60%, #0A0B0E 100%);
  padding:20px;
}
.lock-card{
  background:var(--card); border-radius:20px; padding:36px 32px; width:100%; max-width:380px;
  box-shadow: var(--shadow-lg); text-align:center; animation: modalIn .35s cubic-bezier(.2,.9,.3,1.2);
}
.lock-card .mark{
  width:56px; height:56px; border-radius:14px; margin:0 auto 16px;
  background: linear-gradient(135deg, var(--orange), var(--orange-dark));
  display:flex; align-items:center; justify-content:center; font-family:var(--font-display);
  font-weight:800; color:#fff; font-size:24px; box-shadow: 0 8px 20px rgba(246,139,30,0.4);
}
.lock-card h2{ font-family:var(--font-display); font-size:19px; margin-bottom:4px; }
.lock-card p{ color:var(--muted); font-size:12.5px; margin-bottom:20px; }
.lock-card input{ text-align:center; letter-spacing:4px; font-size:18px; margin-bottom:14px; }
.lock-card .lock-err{ color:var(--danger); font-size:12px; font-weight:600; min-height:16px; margin-top:-4px; margin-bottom:10px; }

/* ============================================================
   THEME TOGGLE
   ============================================================ */
.theme-toggle .sun{ display:none; }
[data-theme="dark"] .theme-toggle .sun{ display:block; }
[data-theme="dark"] .theme-toggle .moon{ display:none; }

/* ============================================================
   CUSTOMERS / MESSAGING
   ============================================================ */
.msg-tpl-vars{ font-size:11px; color:var(--muted); margin-top:4px; }
.msg-tpl-vars b{ font-family:var(--font-mono); background:var(--bg); padding:1px 5px; border-radius:4px; color:var(--text); }
.cust-select-row{ display:flex; align-items:center; gap:10px; }
.chan-choice{ display:flex; gap:8px; margin:10px 0; }
.chan-choice label{
  flex:1; border:1.5px solid var(--border); border-radius:8px; padding:10px; text-align:center;
  font-size:12.5px; font-weight:700; cursor:pointer; transition:all .15s ease;
}
.chan-choice input{ display:none; }
.chan-choice input:checked + span{ color:var(--orange-dark); }
.chan-choice label:has(input:checked){ border-color:var(--orange); background:var(--orange-light); }

/* ============================================================
   SYNC / SETTINGS EXTRAS
   ============================================================ */
.sync-status-dot{ width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:6px; background:var(--muted); }
.sync-status-dot.ok{ background:var(--success); }
.sync-status-dot.err{ background:var(--danger); }
.history-list{ max-height:280px; overflow-y:auto; }
.history-item{ padding:10px 12px; border-bottom:1px solid var(--border); font-size:12.5px; }
.history-item:last-child{ border-bottom:none; }
.history-item .h-date{ color:var(--muted); font-size:11px; margin-bottom:2px; }

/* ---- Topbar ---- */
.topbar{
  height: var(--topbar-h);
  background: var(--card);
  border-bottom: 1px solid var(--border);
  display:flex; align-items:center; gap:16px;
  padding: 0 22px;
  position:sticky; top:0; z-index:150;
}
.hamburger{
  display:none; width:38px; height:38px; border-radius:var(--radius-sm);
  align-items:center; justify-content:center; background:var(--bg);
}
.hamburger span, .hamburger span::before, .hamburger span::after{
  content:''; display:block; width:18px; height:2px; background:var(--charcoal); position:relative; border-radius:2px;
}
.hamburger span::before{ position:absolute; top:-6px; }
.hamburger span::after{ position:absolute; top:6px; }

.topbar-title{ font-family:var(--font-display); font-weight:700; font-size:19px; }
.topbar-title span{ color:var(--orange); }

.search-wrap{
  flex:1; max-width:420px;
  position:relative;
  margin-left: 8px;
}
.search-wrap input{
  width:100%; padding: 10px 14px 10px 38px; border-radius: 24px;
  border:1.5px solid var(--border); background: var(--bg); font-size:13.5px;
  transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
}
.search-wrap .icon{ position:absolute; left:13px; top:50%; transform:translateY(-50%); opacity:0.45; padding: 20px; }

.topbar-actions{ display:flex; align-items:center; gap:10px; margin-left:auto; }
.icon-btn{
  width:42px; height:42px; border-radius:50%; background:var(--bg);
  display:flex; align-items:center; justify-content:center; position:relative;
  transition: background .18s ease, transform .18s ease;
}
.icon-btn:hover{ background:var(--orange-light); transform: translateY(-1px); }
.icon-btn .count{
  position:absolute; top:-4px; right:-4px; background:var(--danger); color:#fff;
  font-size:10.5px; font-weight:700; min-width:18px; height:18px; border-radius:20px;
  display:flex; align-items:center; justify-content:center; padding:0 4px;
  border:2px solid var(--card);
}
.clock{ font-size:12.5px; color:var(--muted); text-align:right; line-height:1.3; display:none; }
.clock b{ display:block; color:var(--text); font-size:13.5px; font-family:var(--font-display); }

/* ---- Topbar mini media transport (shown while music/video is active) ---- */
.topbar-media{
  display:none; align-items:center; gap:6px; background:var(--bg); border-radius:20px; padding:5px 6px 5px 12px;
  max-width:220px;
}
.topbar-media.show{ display:flex; }
.topbar-media .tm-name{ font-size:11.5px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100px; }
.topbar-media button{ width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:var(--card); font-size:12px; flex-shrink:0; transition: background .15s ease; }
.topbar-media button:hover{ background:var(--orange-light); color:var(--orange-dark); }
.topbar-media .tm-play{ background:var(--orange); color:#fff; }
.topbar-media .tm-play:hover{ background:var(--orange-dark); color:#fff; }

/* ---- Main content ---- */
.main-wrap{ margin-left: var(--sidebar-w); flex:1; display:flex; flex-direction:column; min-width:0; }
.view{ display:none; padding: 22px; flex:1; animation: viewIn .35s ease; }
.view.active{ display:block; }
@keyframes viewIn{ from{ opacity:0; transform: translateY(8px);} to{opacity:1; transform:translateY(0);} }

.section-head{ 
  display: flex; 
  align-items: center; 
  justify-content: space-between; 
  margin-bottom: 0px;
  flex-wrap: wrap; 
  gap: 12px;
  position: sticky;
  top: var(--topbar-h);
  z-index: 11;
  background: var(--bg);
  padding-top: 14px;
  padding-bottom: 10px;
}
.section-head h1{ font-family:var(--font-display); font-size:22px; font-weight:700; }
.section-head p{ color:var(--muted); font-size:13px; margin-top:2px; }

/* ============================================================
   BUTTONS
   ============================================================ */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding: 11px 20px; border-radius: var(--radius-sm); font-weight:600; font-size:13.5px;
  transition: transform .15s ease, box-shadow .15s ease, background .15s ease, opacity .15s ease;
  white-space:nowrap;
}
.btn:active{ transform: scale(0.96); }
.btn-primary{ background: linear-gradient(135deg, var(--orange), var(--orange-dark)); color:#fff; box-shadow: 0 6px 16px rgba(246,139,30,0.35); }
.btn-primary:hover{ box-shadow: 0 8px 22px rgba(246,139,30,0.48); transform: translateY(-1px); }
.btn-dark{ background: var(--ink); color:#fff; }
.btn-dark:hover{ background: var(--charcoal-2); }
.btn-outline{ background:var(--card); border:1.5px solid var(--border); color:var(--text); }
.btn-outline:hover{ border-color: var(--orange); color:var(--orange-dark); }
.btn-success{ background: var(--success); color:#fff; }
.btn-success:hover{ background: var(--success-dark); }
.btn-danger{ background: var(--danger); color:#fff; }
.btn-danger:hover{ background: var(--danger-dark); }
.btn-ghost{ background:transparent; color:var(--muted); }
.btn-ghost:hover{ color:var(--text); background:var(--bg); }
.btn-sm{ padding:7px 12px; font-size:12.5px; border-radius:7px; }
.btn-block{ width:100%; }
.btn:disabled{ opacity:0.5; cursor:not-allowed; transform:none !important; }
.btn-icon{ width:38px; height:38px; padding:0; border-radius:8px; }

/* ============================================================
   CARDS / STATS
   ============================================================ */
.stat-grid{ display:grid; grid-template-columns: repeat(4, 1fr); gap:16px; margin-bottom:22px; }
.stat-card{
  background: var(--card); border-radius: var(--radius); padding:18px 20px;
  box-shadow: var(--shadow-sm); border:1px solid var(--border);
  display:flex; align-items:center; gap:14px;
  transition: transform .2s ease, box-shadow .2s ease;
}
.stat-card:hover{ transform: translateY(-3px); box-shadow: var(--shadow-md); }
.stat-card .stat-ico{
  width:46px; height:46px; border-radius:12px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:20px;
}
.stat-card .stat-info b{ font-family:var(--font-display); font-size:21px; display:block; line-height:1.2; }
.stat-card .stat-info span{ font-size:12px; color:var(--muted); font-weight:600; }
.stat-card .stat-delta{ font-size:11px; font-weight:700; margin-top:3px; }
.stat-delta.up{ color:var(--success); }
.stat-delta.down{ color:var(--danger); }

.card{
  background:var(--card); border-radius:var(--radius); border:1px solid var(--border);
  box-shadow: var(--shadow-sm);
}

/* ============================================================
   POS: CATEGORY CHIPS + PRODUCT GRID
   ============================================================ */
.pos-layout{ display:flex; gap:18px; align-items:flex-start; }
.pos-main{ flex:1; min-width:0; }

.chip-row{ 
  display:flex; gap:8px; overflow-x:auto; padding-bottom:10px; margin-bottom:14px; 
  position: sticky;
  top: calc(var(--topbar-h) + 62px); 
  z-index: 10;
  background: rgba(243, 244, 248, 0.72);
  backdrop-filter: blur(12px) saturate(180%);
  -webkit-backdrop-filter: blur(12px) saturate(180%);
  padding-top: 10px;
}
[data-theme="dark"] .chip-row{ background: rgba(20, 22, 28, 0.72); }
.chip{
  flex-shrink:0; padding: 9px 18px; border-radius:20px; background:var(--card); border:1.5px solid var(--border);
  font-size:13px; font-weight:600; color:var(--muted); transition: all .18s ease;
}
.chip:hover{ border-color: var(--orange); color:var(--orange-dark); }
.chip.active{ background: var(--ink); border-color:var(--ink); color:#fff; }

.product-grid{
  display:grid; grid-template-columns: repeat(auto-fill, minmax(168px, 1fr)); gap:14px;
}
.product-card{
  background:var(--card); border-radius: var(--radius); overflow:hidden; border:1px solid var(--border);
  cursor:pointer; position:relative; transition: transform .18s ease, box-shadow .18s ease;
  animation: cardPop .3s ease backwards;
}
.product-card:hover{ transform: translateY(-4px); box-shadow: var(--shadow-md); border-color: var(--orange); }
.product-card:active{ transform: scale(0.97); }
.product-card .thumb{
  height:110px; background:var(--bg); display:flex; align-items:center; justify-content:center; overflow:hidden;
  position:relative;
}
.product-card .thumb img{ width:100%; height:100%; object-fit:cover; }
.product-card .thumb .ph{ font-size:34px; opacity:0.25; }
.product-card .stock-tag{
  position:absolute; top:7px; right:7px; font-size:9.5px; font-weight:800; padding:3px 7px; border-radius:6px;
  background:rgba(30,33,41,0.75); color:#fff; letter-spacing:0.3px;
}
.product-card .stock-tag.low{ background: var(--danger); }
.product-card .stock-tag.out{ background:#8A8E99; }
.product-card .info{ padding:10px 12px 12px; }
.product-card .pname{ font-size:13px; font-weight:600; line-height:1.3; margin-bottom:5px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; min-height:33px;}
.product-card .pprice{ font-family:var(--font-display); font-weight:700; color:var(--orange-dark); font-size:15px; }
.product-card .pcat{ font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.4px; margin-top:2px;}
.product-card .add-flash{
  position:absolute; inset:0; background:rgba(29,185,84,0.92); color:#fff; display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:13px; opacity:0; pointer-events:none; transition:opacity .25s ease;
}
.product-card.flash .add-flash{ opacity:1; animation: flashOut .55s ease forwards; }
@keyframes flashOut{ 0%{opacity:1;} 70%{opacity:1;} 100%{opacity:0;} }
@keyframes cardPop{ from{ opacity:0; transform: scale(0.92);} to{opacity:1; transform:scale(1);} }

/* ---- Product view-mode switcher (Large/Small icons, List, Content, Titles) ---- */
.view-switch{
  display:flex; gap:3px; background:var(--card); border:1.5px solid var(--border); border-radius:10px; padding:4px;
  flex-shrink:0;
}
.view-switch-btn{
  width:32px; height:32px; border-radius:7px; font-size:14px; color:var(--muted);
  display:flex; align-items:center; justify-content:center; transition: all .15s ease; flex-shrink:0;
}
.view-switch-btn:hover{ background:var(--orange-light); color:var(--orange-dark); }
.view-switch-btn.active{ background:var(--ink); color:#fff; }

/* ---- Grid layout per view mode ---- */
.product-grid.view-mode-large{ display:grid; grid-template-columns: repeat(auto-fill, minmax(168px, 1fr)); gap:14px; }
.product-grid.view-mode-small{ display:grid; grid-template-columns: repeat(auto-fill, minmax(118px, 1fr)); gap:10px; }
.product-grid.view-mode-list,
.product-grid.view-mode-content,
.product-grid.view-mode-titles{ display:flex; flex-direction:column; gap:8px; }

/* ---- Card layout per view mode (list / content / titles are row-based) ---- */
.product-card.mode-small .thumb{ height:74px; }
.product-card.mode-small .pname{ font-size:12px; min-height:auto; -webkit-line-clamp:1; }
.product-card.mode-small .pprice{ font-size:13px; }
.product-card.mode-small .info{ padding:8px 9px 9px; }

.product-card.mode-list,
.product-card.mode-content,
.product-card.mode-titles{
  display:flex; align-items:center; gap:12px; padding:10px 14px; animation:none;
}
.product-card.mode-list .thumb,
.product-card.mode-content .thumb{
  position:relative; flex-shrink:0; border-radius:8px; overflow:hidden;
}
.product-card.mode-list .thumb{ width:44px; height:44px; }
.product-card.mode-content .thumb{ width:60px; height:60px; }
.product-card.mode-list .info,
.product-card.mode-content .info,
.product-card.mode-titles .info{
  padding:0; flex:1; min-width:0; display:flex; align-items:center; justify-content:space-between; gap:10px;
}
.product-card.mode-list .pname,
.product-card.mode-content .pname,
.product-card.mode-titles .pname{
  min-height:auto; -webkit-line-clamp:1; margin-bottom:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.product-card.mode-content .pcat{ margin-top:1px; }
.product-card.mode-titles .thumb{ display:none; }
.product-card.mode-list .stock-tag,
.product-card.mode-content .stock-tag,
.product-card.mode-titles .stock-tag{ position:static; white-space:nowrap; }

.empty-state{ text-align:center; padding: 60px 20px; color:var(--muted); }
.empty-state .ico{ font-size:46px; margin-bottom:12px; opacity:0.35; }
.empty-state h3{ font-family:var(--font-display); color:var(--text); margin-bottom:6px; }

/* ============================================================
   CART PANEL
   ============================================================ */
.cart-panel{
  width:380px; flex-shrink:0; background:var(--card); border-radius: var(--radius);
  border:1px solid var(--border); box-shadow: var(--shadow-lg);
  display:flex; flex-direction:column;
  position: fixed; top: calc(var(--topbar-h) + 14px); right: 22px;
  height: calc((100vh - var(--topbar-h) - 30px) / var(--zf));
  max-height: calc((100vh - var(--topbar-h) - 30px) / var(--zf));
  transition: transform .32s ease;
  z-index: 25;
}
/* Cart stays fixed on screen and is never moved by page scroll on desktop */
@media (min-width: 1181px){
  .pos-main{ margin-right: 398px; }
}
/* Smaller laptop screens: narrower cart panel, still fixed & static-feeling */
@media (min-width: 1181px) and (max-width: 1440px){
  .cart-panel{ width: 320px; right: 16px; }
  .pos-main{ margin-right: 336px; }
  .product-grid.view-mode-large{ grid-template-columns: repeat(auto-fill, minmax(142px, 1fr)); }
  .product-grid.view-mode-small{ grid-template-columns: repeat(auto-fill, minmax(104px, 1fr)); }
}
.cart-head{
  padding:16px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0;
}
.cart-head h3{ font-family:var(--font-display); font-size:15.5px; display:flex; align-items:center; gap:8px;}
.cart-head .cart-count{ background:var(--orange); color:#fff; font-size:11px; font-weight:800; padding:2px 8px; border-radius:20px;}
.cart-items{ flex:1 1 auto; overflow-y:auto; padding: 8px 14px; min-height:80px; }
.cart-line{
  display:flex; gap:10px; align-items:center; padding:10px 4px; border-bottom:1px dashed var(--border);
  animation: lineIn .25s ease;
}
@keyframes lineIn{ from{opacity:0; transform: translateX(12px);} to{opacity:1; transform:translateX(0);} }
.cart-line .thumb-sm{ width:42px; height:42px; border-radius:8px; background:var(--bg); overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:16px; opacity:0.5;}
.cart-line .thumb-sm img{ width:100%; height:100%; object-fit:cover; }
.cart-line .cl-info{ flex:1; min-width:0; }
.cart-line .cl-name{ font-size:12.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cart-line .cl-price{ font-size:11.5px; color:var(--muted); }
.qty-stepper{ display:flex; align-items:center; gap:6px; }
.qty-stepper button{
  width:22px; height:22px; border-radius:6px; background:var(--bg); font-weight:700; font-size:13px; display:flex; align-items:center; justify-content:center;
  transition: background .15s ease;
}
.qty-stepper button:hover{ background: var(--orange-light); color:var(--orange-dark); }
.qty-stepper span{ font-size:12.5px; font-weight:700; min-width:16px; text-align:center; }
.cl-remove{ color:var(--danger); font-size:15px; margin-left:4px; opacity:0.6; transition:opacity .15s ease;}
.cl-remove:hover{ opacity:1; }

.cart-empty{ text-align:center; padding:30px 10px; color:var(--muted); font-size:13px; }

.cart-details{
  border-top:1px solid var(--border); padding: 14px 18px; overflow-y:auto;
  max-height: 260px; transition: max-height .35s ease, padding .35s ease, opacity .3s ease;
  flex-shrink:0;
}
.cart-details.collapsed{ max-height:0; padding-top:0; padding-bottom:0; opacity:0; overflow:hidden; }
.toggle-details{
  width:100%; padding:11px 18px; display:flex; align-items:center; justify-content:space-between;
  font-size:12.5px; font-weight:700; color:var(--muted); border-top:1px solid var(--border);
  flex-shrink:0;
}
.toggle-details .chevron{ transition: transform .3s ease; }
.toggle-details.open .chevron{ transform: rotate(180deg); }

.field-row{ margin-bottom:12px; }
.field-row label{ font-size:11.5px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.4px; display:block; margin-bottom:6px; }
.field-row input, .field-row select, .field-row textarea{
  width:100%; padding:10px 12px; border:1.5px solid var(--border); border-radius:8px; font-size:13.5px;
  transition: border-color .18s ease, box-shadow .18s ease;
  background:var(--card); color:var(--text);
}
.field-row input:focus, .field-row select:focus, .field-row textarea:focus{
  border-color:var(--orange); box-shadow: 0 0 0 4px rgba(246,139,30,0.12);
}
.pay-methods{ display:flex; gap:8px; }
.pay-methods button{
  flex:1; padding:10px 6px; border-radius:8px; border:1.5px solid var(--border); font-size:11.5px; font-weight:700; text-align:center;
  transition: all .18s ease; color:var(--text);
}
.pay-methods button.active{ background:var(--ink); border-color:var(--ink); color:#fff; }

.totals-box{ padding: 14px 18px; border-top:1px solid var(--border); flex-shrink:0; }
.tot-row{ display:flex; justify-content:space-between; font-size:13px; color:var(--muted); margin-bottom:7px; }
.tot-row.grand{ font-size:17px; font-weight:800; color:var(--text); font-family:var(--font-display); margin-top:8px; padding-top:10px; border-top:1px dashed var(--border); }
.tot-row.change{ color:var(--success-dark); font-weight:700; font-size:14px; }
.tot-row span:last-child{ font-weight:700; color:var(--text); }

.cart-actions{ padding: 6px 18px 18px; display:flex; gap:8px; flex-shrink:0; }

/* ============================================================
   TABLES
   ============================================================ */
.table-wrap{ overflow:auto; max-height: calc(62vh / var(--zf)); border-radius: var(--radius); border:1px solid var(--border); background:var(--card); }
table{ width:100%; border-collapse:collapse; font-size:13px; min-width:640px;}
thead th{
  position: sticky; top: 0; z-index: 5;
  text-align:left; padding:13px 16px; background:var(--bg); font-weight:700; font-size:11.5px;
  text-transform:uppercase; letter-spacing:0.4px; color:var(--muted); border-bottom:1px solid var(--border);
  white-space:nowrap;
}
[data-theme="dark"] thead th{ background:#171921; }
tbody td{ padding:12px 16px; border-bottom:1px solid var(--border); vertical-align:middle; }
tbody tr{ transition: background .15s ease; }
tbody tr:hover{ background: var(--orange-light); }
tbody tr:last-child td{ border-bottom:none; }
.cell-prod{ display:flex; align-items:center; gap:10px; }
.cell-prod .thumb-sm{ width:36px; height:36px; border-radius:7px; background:var(--bg); overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:14px; opacity:0.5;}
.cell-prod .thumb-sm img{ width:100%; height:100%; object-fit:cover; }
.pid-tag{ font-family:var(--font-mono); font-size:11.5px; background:var(--bg); padding:3px 7px; border-radius:5px; color:var(--muted); }
.badge{ display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
.badge-success{ background:rgba(29,185,84,0.12); color:var(--success-dark); }
.badge-danger{ background:rgba(225,73,58,0.12); color:var(--danger-dark); }
.badge-warning{ background:rgba(245,166,35,0.15); color:#946200; }
.badge-info{ background:rgba(47,128,237,0.12); color:var(--info); }
.row-actions{ display:flex; gap:6px; }
.table-toolbar{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px; flex-wrap:wrap; }
.table-toolbar .right-tools{ display:flex; gap:8px; flex-wrap:wrap; }

/* ============================================================
   MODALS
   ============================================================ */
.modal-overlay{
  position:fixed; inset:0; background:rgba(20,22,28,0.55); backdrop-filter: blur(3px);
  display:none; align-items:center; justify-content:center; z-index:1000; padding:20px;
  animation: overlayIn .2s ease;
}
.modal-overlay.show{ display:flex; }
@keyframes overlayIn{ from{ opacity:0;} to{opacity:1;} }
.modal{
  background:var(--card); color:var(--text); border-radius:16px; width:100%; max-width:460px; max-height: calc(88vh / var(--zf)); overflow-y:auto;
  box-shadow: var(--shadow-lg); animation: modalIn .3s cubic-bezier(.2,.9,.3,1.2);
}
.modal.modal-lg{ max-width:640px; }
.modal.modal-receipt{ max-width:360px; }
@keyframes modalIn{ from{ opacity:0; transform: translateY(24px) scale(0.96);} to{opacity:1; transform:translateY(0) scale(1);} }
.modal-head{ display:flex; align-items:center; justify-content:space-between; padding:18px 22px; border-bottom:1px solid var(--border); }
.modal-head h3{ font-family:var(--font-display); font-size:16.5px; }
.modal-close{ width:32px; height:32px; border-radius:50%; background:var(--bg); display:flex; align-items:center; justify-content:center; font-size:16px; color:var(--muted); transition: all .15s ease;}
.modal-close:hover{ background:var(--danger); color:#fff; transform: rotate(90deg); }
.modal-body{ padding:22px; }
.modal-foot{ padding:16px 22px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; flex-wrap:wrap; }

.form-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.form-grid .full{ grid-column: 1 / -1; }

.img-drop{
  border:2px dashed var(--border); border-radius:12px; padding:18px; text-align:center; cursor:pointer;
  transition: all .2s ease; position:relative; background:var(--bg);
}
.img-drop:hover{ border-color:var(--orange); background:var(--orange-light); }
.img-drop .preview{ width:90px; height:90px; border-radius:10px; object-fit:cover; margin:0 auto 8px; display:none; }
.img-drop .ph-ico{ font-size:26px; opacity:0.4; margin-bottom:6px; }
.img-drop small{ color:var(--muted); font-size:11.5px; }
.img-drop input[type=file]{ position:absolute; inset:0; opacity:0; cursor:pointer; }

/* ============================================================
   RECEIPT
   ============================================================ */
.receipt{
  font-family: var(--font-mono); padding: 20px 22px; font-size:12.5px; color:#1a1a1a;
  background: #fff;
}
.receipt.thermal-58, .receipt.thermal-80{ padding: 10px 8px; }
.receipt-top{ text-align:center; margin-bottom:10px; }
.receipt-top .rlogo{ font-family:var(--font-display); font-weight:800; font-size:16px; letter-spacing:0.5px; }
.receipt-top small{ display:block; color:#555; font-size:10.5px; margin-top:2px; }
.receipt hr{ border:none; border-top:1px dashed #999; margin:10px 0; }
.receipt .rline{ display:flex; justify-content:space-between; margin-bottom:4px; }
.receipt .rmeta{ font-size:11px; color:#444; margin-bottom:2px;}
.receipt .ritem{ margin-bottom:6px; }
.receipt .ritem .rname{ display:flex; justify-content:space-between; font-weight:700; }
.receipt .ritem .rsub{ display:flex; justify-content:space-between; font-size:11px; color:#555; }
.receipt .rtotal{ font-weight:800; font-size:14px; display:flex; justify-content:space-between; margin-top:6px;}
.receipt .rfoot{ text-align:center; margin-top:14px; font-size:11px; color:#555; }
.receipt .rfoot b{ display:block; color:#1a1a1a; font-size:12.5px; margin-bottom:3px; }
.receipt .rbarcode{ text-align:center; margin-top:10px; letter-spacing:2px; font-size:22px; }

/* ============================================================
   TOASTS
   ============================================================ */
#toast-stack{ position:fixed; bottom:22px; right:22px; z-index:2000; display:flex; flex-direction:column; gap:10px; }
.toast{
  background:var(--ink); color:#fff; padding:13px 18px; border-radius:10px; font-size:13px; font-weight:600;
  box-shadow: var(--shadow-lg); display:flex; align-items:center; gap:10px; min-width:240px;
  animation: toastIn .35s cubic-bezier(.2,.9,.3,1.2);
}
.toast.success{ background: linear-gradient(135deg,#1DB954,#159144); }
.toast.error{ background: linear-gradient(135deg,#E1493A,#C43226); }
.toast.info{ background: linear-gradient(135deg,#2F80ED,#1D5FC7); }
.toast .t-ico{ font-size:16px; }
@keyframes toastIn{ from{ opacity:0; transform: translateX(40px);} to{opacity:1; transform:translateX(0);} }
.toast.hide{ animation: toastOut .3s ease forwards; }
@keyframes toastOut{ to{ opacity:0; transform: translateX(40px); } }

/* ---- Media "now" notification (transient, shown for ~3s on track/video change) ---- */
#mediaNotify{
  position:fixed; top:80px; left:50%; transform:translateX(-50%) translateY(-12px);
  background:var(--ink); color:#fff; padding:12px 20px; border-radius:12px; font-size:13px; font-weight:600;
  box-shadow: var(--shadow-lg); z-index:3500; display:flex; align-items:center; gap:10px;
  opacity:0; pointer-events:none; transition: opacity .3s ease, transform .3s ease;
  max-width:320px;
}
#mediaNotify.show{ opacity:1; transform:translateX(-50%) translateY(0); }
#mediaNotify .mn-ico{ font-size:18px; flex-shrink:0; }
#mediaNotify .mn-text b{ display:block; font-size:11px; text-transform:uppercase; letter-spacing:.4px; opacity:.75; font-weight:700; }
#mediaNotify .mn-text span{ display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:250px; }

/* ============================================================
   LOGIN / PASSWORD GATE
   ============================================================ */
.gate-box{ text-align:center; padding-top:6px; }
.gate-box .gate-ico{
  width:60px; height:60px; border-radius:16px; background: linear-gradient(135deg, var(--orange), var(--orange-dark));
  display:flex; align-items:center; justify-content:center; font-size:26px; margin:0 auto 16px; color:#fff;
  box-shadow: 0 8px 20px rgba(246,139,30,0.35);
}
.gate-box h3{ font-family:var(--font-display); margin-bottom:6px; }
.gate-box p{ color:var(--muted); font-size:13px; margin-bottom:18px; }
.gate-box input{ text-align:center; letter-spacing:4px; font-size:18px; }
.shake{ animation: shake .4s ease; }
@keyframes shake{ 0%,100%{transform:translateX(0);} 20%{transform:translateX(-8px);} 40%{transform:translateX(8px);} 60%{transform:translateX(-6px);} 80%{transform:translateX(6px);} }

/* ============================================================
   MISC UTIL
   ============================================================ */
.flex{ display:flex; } .items-center{ align-items:center; } .gap-8{ gap:8px; } .gap-12{gap:12px;}
.text-muted{ color:var(--muted); } .text-right{ text-align:right; }
.mt-8{margin-top:8px;} .mt-16{margin-top:16px;} .mb-16{margin-bottom:16px;}
.w-full{ width:100%; }
.hidden{ display:none !important; }
.divider{ height:1px; background:var(--border); margin:16px 0; }
.spinner{ width:16px; height:16px; border:2px solid rgba(255,255,255,0.4); border-top-color:#fff; border-radius:50%; animation: spin .7s linear infinite; }
@keyframes spin{ to{ transform: rotate(360deg); } }

.low-stock-list{ display:flex; flex-direction:column; gap:8px; }
.low-stock-item{ display:flex; align-items:center; justify-content:space-between; padding:10px 12px; background:var(--bg); border-radius:8px; font-size:12.5px; }

/* ============================================================
   MEDIA — BACKGROUND MUSIC & VIDEO
   ============================================================ */
.media-track-row{ transition: background .15s ease; }
.media-track-row:hover{ background: var(--bg); border-radius:8px; }
.media-track-row.playing{ background: var(--orange-light); border-radius:8px; }
.media-track-row:last-child{ border-bottom:none !important; }
.hist-input{ padding:9px 12px; border:1.5px solid var(--border); border-radius:8px; font-size:13px; background:var(--card); color:var(--text); }

/* Static (non-scrolling) player card: the surrounding page/column can
   scroll (e.g. a long playlist) while the transport controls stay put. */
.media-player-card{ position:sticky; top: calc(var(--topbar-h) + 14px); }
.media-player-card-video{ position:static !important; top:auto !important; }
.media-playlist-scroll{ overflow-y:auto; }
.media-playlist-scroll::-webkit-scrollbar{ width:10px; }
.media-playlist-scroll::-webkit-scrollbar-thumb{ background:var(--border); border-radius:8px; }
.media-playlist-scroll::-webkit-scrollbar-thumb:hover{ background:var(--orange); }

/* ---- Media view: fixed to the viewport, only playlists/players scroll ---- */
#viewMedia.active{
  padding: 16px 22px;
}
#viewMedia .media-player-card{ position: static; }
#viewMedia .media-playlist-scroll{
  max-height: calc(40vh / var(--zf));
  overflow-y: auto;
}
#viewMedia .video-player-wrap{ max-height: calc(38vh / var(--zf)); }

body.media-narrow #viewMedia .form-grid{
  grid-template-columns: 1fr !important;
}

/* ---- Custom video player with timeline, fullscreen & resize ---- */
.video-player-wrap{ position:relative; background:#000; border-radius:10px; overflow:hidden; resize:both; min-width:220px; min-height:140px; max-width:100%; }
.video-player-wrap video{ width:100%; height:100%; display:block; background:#000; }
.video-controls{
  position:absolute; left:0; right:0; bottom:0; padding:8px 10px 10px;
  background: linear-gradient(0deg, rgba(0,0,0,0.75), rgba(0,0,0,0));
  display:flex; flex-direction:column; gap:6px; opacity:0; transition:opacity .2s ease;
}
.video-player-wrap:hover .video-controls, .video-player-wrap.controls-visible .video-controls{ opacity:1; }
.video-seek{ width:100%; accent-color:var(--orange); cursor:pointer; }
.video-controls-row{ display:flex; align-items:center; gap:8px; }
.video-controls-row button{ width:30px; height:30px; border-radius:50%; background:rgba(255,255,255,0.15); color:#fff; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
.video-controls-row button:hover{ background:rgba(255,255,255,0.28); }
.video-time{ color:#fff; font-size:11px; font-family:var(--font-mono); flex-shrink:0; }
.video-controls-row .spacer{ flex:1; }

/* ---- Floating mini/PiP player: draggable, minimizable, persists across views ---- */
#floatingMediaPlayer{
  position:fixed; z-index:4000; width:300px; background:var(--card); border-radius:14px;
  box-shadow: var(--shadow-lg); border:1px solid var(--border); overflow:hidden;
  display:none;
}
#floatingMediaPlayer.show{ display:block; }
#floatingMediaPlayer.minimized{ width:auto; }
#floatingMediaPlayer .fmp-drag{
  cursor:grab; padding:8px 10px; display:flex; align-items:center; gap:8px; background:var(--bg);
  font-size:11.5px; font-weight:700;
}
#floatingMediaPlayer .fmp-drag:active{ cursor:grabbing; }
#floatingMediaPlayer .fmp-drag span{ flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#floatingMediaPlayer .fmp-drag button{ width:24px; height:24px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--muted); }
#floatingMediaPlayer .fmp-drag button:hover{ background:var(--orange-light); color:var(--orange-dark); }
#floatingMediaPlayer .fmp-body{ padding:10px; }
#floatingMediaPlayer.minimized .fmp-body{ display:none; }
#floatingMediaPlayer video{ width:100%; border-radius:8px; background:#000; max-height:170px; }
#floatingMediaPlayer .fmp-transport{ display:flex; align-items:center; justify-content:center; gap:10px; margin-top:8px; }
#floatingMediaPlayer .fmp-transport button{ width:32px; height:32px; border-radius:50%; background:var(--bg); display:flex; align-items:center; justify-content:center; font-size:13px; }
#floatingMediaPlayer .fmp-transport button.fmp-play{ background:var(--orange); color:#fff; width:38px; height:38px; }

/* ============================================================
   LOADING SCREEN (shown on startup while gathering local data)
   ============================================================ */
#loadingScreen{
  position:fixed; inset:0; z-index:6000; display:flex; align-items:center; justify-content:center;
  background: radial-gradient(circle at 20% 15%, #2A2E38 0%, #14161C 60%, #0A0B0E 100%);
  padding:20px;
}
.loading-card{
  width:100%; max-width:340px; text-align:center;
  animation: modalIn .4s cubic-bezier(.2,.9,.3,1.2);
}
.loading-mark{
  width:64px; height:64px; border-radius:16px; margin:0 auto 18px;
  background: linear-gradient(135deg, var(--orange), var(--orange-dark));
  display:flex; align-items:center; justify-content:center; font-family:var(--font-display);
  font-weight:800; color:#fff; font-size:28px; box-shadow: 0 10px 26px rgba(246,139,30,0.45);
  animation: loadingPulse 1.6s ease-in-out infinite;
}
@keyframes loadingPulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.06); } }
.loading-title{ font-family:var(--font-display); font-weight:700; font-size:24px; color:#fff; margin-bottom:6px; letter-spacing:0.2px; }
.loading-title span{ color:var(--orange); }
.loading-tagline{ font-size:12.5px; color:#9AA0AF; margin-bottom:28px; }
.loading-bar{ width:100%; height:8px; border-radius:20px; background:rgba(255,255,255,0.1); overflow:hidden; margin-bottom:12px; }
.loading-fill{ height:100%; width:0%; border-radius:20px; background: linear-gradient(90deg, var(--orange), var(--orange-dark)); transition: width .35s ease; }
.loading-status{ font-size:12.5px; color:#B7BBC7; font-weight:600; min-height:16px; }
.loading-pct{ font-family:var(--font-display); font-size:12px; color:#6E7382; margin-top:6px; letter-spacing:0.5px; }

/* ============================================================
   PRINT
   ============================================================ */
#print-area{ display:none; }
@media print{
  html, body{ margin:0 !important; padding:0 !important; height:auto !important; min-height:0 !important; background:#fff !important; color:#000 !important; }
  body *{ visibility:hidden; }
  #print-area{ display:block !important; visibility:visible; position:absolute; top:0; left:0; margin:0 !important; padding:0 !important; width:auto; }
  #print-area, #print-area *{ visibility:visible; }
  #print-area .receipt{ margin:0 !important; }
  .modal-overlay{ position:absolute; background:none; backdrop-filter:none; }
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (min-width: 900px){ .clock{ display:block; } }

@media (max-width: 1180px){
  .pos-layout{ flex-direction:column; }
  .cart-panel{ width:100%; position:static; max-height:none; height:auto; }
  .stat-grid{ grid-template-columns: repeat(2,1fr); }
}

@media (max-width: 860px){
  .sidebar{ transform: translateX(-100%); box-shadow: var(--shadow-lg); }
  .sidebar.open{ transform: translateX(0); }
  .sidebar-close{ display:flex; margin-left:auto; width:30px; height:30px; border-radius:50%; background:rgba(255,255,255,0.08); color:#fff; align-items:center; justify-content:center; }
  .main-wrap{ margin-left:0; }
  .hamburger{ display:flex; }
  .topbar{ padding:0 14px; gap:10px; }
  .topbar-title{ display:none; }
  .search-wrap{ max-width:none; }
  .stat-grid{ grid-template-columns: 1fr 1fr; gap:10px; }
  .view{ padding:14px; }
  .form-grid{ grid-template-columns:1fr; }
  .sidebar-scrim{ display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:190; }
  .sidebar-scrim.show{ display:block; }
  .view-switch{ padding:3px; gap:2px; }
  .view-switch-btn{ width:28px; height:28px; font-size:12px; }
  .topbar-media{ display:none !important; }
}

@media (max-width: 560px){
  .stat-grid{ grid-template-columns: 1fr 1fr; }
  .product-grid{ grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); }
  .modal{ max-width:100%; border-radius:16px 16px 0 0; position:fixed; bottom:0; left:0; margin:0; max-height:92vh; }
  .modal-overlay{ align-items:flex-end; padding:0; }
  .cart-actions{ flex-direction:column; }
  .pay-methods{ flex-wrap:wrap; }
  .pay-methods button{ flex: 1 1 30%; }
  .table-toolbar{ flex-direction:column; align-items:stretch; }
  .table-toolbar .right-tools{ justify-content:stretch; }
  .table-toolbar .right-tools .btn{ flex:1; }
  /* Topbar is too tight on small phones for the view-switch alongside search + icon buttons */
  .view-switch{ display:none; }
}
@media (max-width: 1366px) and (min-width: 1181px){
  .stat-grid{ grid-template-columns: repeat(4,1fr); gap:12px; }
  .product-grid.view-mode-large{ grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  .product-grid.view-mode-small{ grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
  .cart-panel{ width: 300px; right:14px; }
  .pos-main{ margin-right: 316px; }
}
@media (max-height: 820px){
  :root{ --topbar-h: 60px; }
  .stat-card{ padding: 12px 14px; }
  .table-wrap{ max-height: 54vh; }
}
@media (max-height: 720px){
  .stat-card .stat-info b{ font-size:18px; }
  .table-wrap{ max-height: 46vh; }
  .modal{ max-height:82vh; }
}
@media (max-width: 900px) and (max-height: 620px){
  .stat-grid{ grid-template-columns: repeat(4,1fr); gap:8px; }
  .stat-card{ flex-direction:column; align-items:flex-start; gap:6px; padding:10px 12px; }
}

/* ============================================================
   HELP / HOW IT WORKS
   ============================================================ */
.help-wrap{ display:flex; gap:22px; align-items:flex-start; }
.help-toc{
  width:220px; flex-shrink:0; position:sticky; top: calc(var(--topbar-h) + 84px); z-index:5;
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  padding:14px; max-height: calc((100vh - var(--topbar-h) - 104px) / var(--zf)); overflow-y:auto;
}
.help-toc a{ display:block; padding:8px 10px; border-radius:8px; font-size:12.5px; font-weight:600; color:var(--muted); margin-bottom:2px; }
.help-toc a:hover{ background:var(--orange-light); color:var(--orange-dark); }
.help-main{ flex:1; min-width:0; display:flex; flex-direction:column; gap:18px; }
.help-section{ background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:22px 24px; scroll-margin-top: calc(var(--topbar-h) + 84px); }
.help-section h2{ font-family:var(--font-display); font-size:17px; display:flex; align-items:center; gap:10px; margin-bottom:6px; }

<body>
<div id="app"></div>
<div id="toast-stack"></div>
<div id="mediaNotify"></div>
<div id="print-area"></div>
<audio id="bgAudioPlayer" style="display:none"></audio>
<div id="floatingMediaPlayer"></div>

<script>
/* ============================================================
   GLIFFITS MART — POS APPLICATION
   Single-file, offline-first. All data in localStorage.
   ============================================================ */

/* ---------------- STORAGE KEYS ---------------- */
const K_PRODUCTS  = 'gth_pos_products';
const K_SALES     = 'gth_pos_sales';
const K_SETTINGS  = 'gth_pos_settings';
const K_CUSTOMERS = 'gth_pos_customers';
const K_SYNC      = 'gth_pos_sync';
const K_UNLOCKED  = 'gth_pos_session_unlocked';

/* ---------------- DEFAULT SETTINGS ---------------- */
const DEFAULT_SETTINGS = {
  menuVisibility: { customers: true, media: true, products: true, priceEdit: true },
  storeName: 'Gliffits Mart',
  storeAddress: '',
  storeContacts: [],
  storeLogo: '',
  currency: 'GHS',
  adminPassword: 'admin123',
  deletePassword: 'delete123',
  pricePassword: 'price123',
  messagePassword: 'message123',
  cashiers: [],
  activeCashierId: '',
  nextProductSeq: 1,
  lowStockThreshold: 5,
  receiptFooter: 'Thank you for shopping with us!',
  theme: 'light',
  sidebarCollapsed: false,
  productViewMode: 'large',
  printerType: 'thermal80',
  directPrintEnabled: false,
  printerBaudRate: 9600,
  appZoom: 100,   /* ← ADD THIS LINE */
  whatsappTemplate: 'Hi {name}, thanks for shopping at {store}! Your receipt {receiptId}: total {total}. We appreciate you!',
  smsTemplate: 'Hi {name}, thanks for shopping at {store}! Receipt {receiptId}, total {total}.',
  offerWhatsappTemplate: 'Hi {name}, {store} has something special for you: {message}',
  offerSmsTemplate: 'Hi {name}, {store}: {message}'
};

const DEFAULT_SYNC = {
  url: '',
  anonKey: '',
  productsTable: 'products',
  salesTable: 'sales',
  customersTable: 'customers',
  lastSync: '',
  autoSync: true,
  syncIntervalSec: 60
};

const K_DELETED_QUEUE = 'gth_pos_deleted_queue';
let DELETED_QUEUE = { products: [], customers: [] };
function loadDeletedQueue(){
  try{
    const raw = localStorage.getItem(K_DELETED_QUEUE);
    DELETED_QUEUE = raw ? JSON.parse(raw) : { products: [], customers: [] };
  }catch(e){ DELETED_QUEUE = { products: [], customers: [] }; }
  if(!Array.isArray(DELETED_QUEUE.products)) DELETED_QUEUE.products = [];
  if(!Array.isArray(DELETED_QUEUE.customers)) DELETED_QUEUE.customers = [];
}
function saveDeletedQueue(){ localStorage.setItem(K_DELETED_QUEUE, JSON.stringify(DELETED_QUEUE)); }
function queueDelete(kind, id){
  if(!DELETED_QUEUE[kind].includes(id)) DELETED_QUEUE[kind].push(id);
  saveDeletedQueue();
}

/* ---------------- STATE ---------------- */
let PRODUCTS = [];
let SALES = [];
let CUSTOMERS = [];
let SETTINGS = { ...DEFAULT_SETTINGS };
let SYNC = { ...DEFAULT_SYNC };
let CART = []; // [{productId, qty}]
let currentView = 'pos';
let activeCategory = 'All';
let productSearchTerm = '';
let editingProductId = null;
let editingCustomerId = null;
let cartDetailsOpen = false;
let activePayMethod = 'Cash';
let pendingAdminAction = null; // function to run after password verified
let historyFilter = { from: '', to: '', q: '' };
let reportFilter = { from: '', to: '' };
let lastReceiptSale = null;
let selectedCustomerIds = new Set();
let customersTableSearch = '';

/* ---------------- PERSISTENCE ---------------- */
function loadState(){
  try{
    const p = localStorage.getItem(K_PRODUCTS);
    PRODUCTS = p ? JSON.parse(p) : seedProducts();
    const s = localStorage.getItem(K_SALES);
    SALES = s ? JSON.parse(s) : [];
    const st = localStorage.getItem(K_SETTINGS);
    SETTINGS = st ? { ...DEFAULT_SETTINGS, ...JSON.parse(st) } : { ...DEFAULT_SETTINGS };
    const c = localStorage.getItem(K_CUSTOMERS);
    CUSTOMERS = c ? JSON.parse(c) : [];
    const sy = localStorage.getItem(K_SYNC);
    SYNC = sy ? { ...DEFAULT_SYNC, ...JSON.parse(sy) } : { ...DEFAULT_SYNC };
  }catch(e){
    console.error('Failed to load state', e);
    PRODUCTS = seedProducts();
    SALES = [];
    CUSTOMERS = [];
    SETTINGS = { ...DEFAULT_SETTINGS };
    SYNC = { ...DEFAULT_SYNC };
  }
  if(!PRODUCTS.length){ PRODUCTS = seedProducts(); saveProducts(); }
  PRODUCTS.forEach(p=>{
    if(!Array.isArray(p.history)) p.history = [];
    if(!p.lastUpdated) p.lastUpdated = p.dateAdded || new Date().toISOString();
    
    // ---- NEW: cost price + FIFO batches backfill ----
    if(p.costPrice === undefined) p.costPrice = null;
    if(!Array.isArray(p.batches)) {
      p.batches = p.qty > 0
        ? [{ id: uid('BAT-'), qty: p.qty, remainingQty: p.qty, price: p.price, costPrice: p.costPrice || null, dateAdded: p.dateAdded || new Date().toISOString() }]
        : [];
    }
    // ---- END NEW ----
  });
  CUSTOMERS.forEach(c=>{ if(!c.id) c.id = uid('CUS-'); if(!c.lastUpdated) c.lastUpdated = c.dateAdded || new Date().toISOString(); });
  SALES.forEach(s=>{ if(!s.lastUpdated) s.lastUpdated = s.timestamp; });
  if(!Array.isArray(SETTINGS.storeContacts)) SETTINGS.storeContacts = SETTINGS.storeContacts ? [SETTINGS.storeContacts] : [];
  if(!SETTINGS.deletePassword) SETTINGS.deletePassword = DEFAULT_SETTINGS.deletePassword;
  if(!SETTINGS.pricePassword) SETTINGS.pricePassword = DEFAULT_SETTINGS.pricePassword;
  if(!SETTINGS.messagePassword) SETTINGS.messagePassword = DEFAULT_SETTINGS.messagePassword;
  if(!Array.isArray(SETTINGS.cashiers)) SETTINGS.cashiers = [];
  loadDeletedQueue();
  saveSettings();
  applyTheme(SETTINGS.theme || 'light');
  applyZoom(SETTINGS.appZoom || 100, true); // true = don't re-save, just apply what's stored
}
function saveProducts(){ localStorage.setItem(K_PRODUCTS, JSON.stringify(PRODUCTS)); scheduleSync(); }
function saveSales(){ localStorage.setItem(K_SALES, JSON.stringify(SALES)); scheduleSync(); }
function saveSettings(){ localStorage.setItem(K_SETTINGS, JSON.stringify(SETTINGS)); }
function saveCustomers(){ localStorage.setItem(K_CUSTOMERS, JSON.stringify(CUSTOMERS)); scheduleSync(); }
function saveSync(){ localStorage.setItem(K_SYNC, JSON.stringify(SYNC)); }

/* Every theme this app ships with. 'light' and 'dark' are the original
   quick-toggle themes; the rest are additional palettes offered under
   Settings > Advanced so people can pick a look they prefer. */
const THEME_LIST = [
  {key:'light', label:'Classic Light', dark:false},
  {key:'dark', label:'Classic Dark', dark:true},
  {key:'midnight', label:'Midnight Blue', dark:true},
  {key:'forest', label:'Forest', dark:false},
  {key:'ocean', label:'Ocean', dark:false},
  {key:'grape', label:'Grape', dark:true},
  {key:'sand', label:'Sand', dark:false},
  {key:'slate', label:'Slate', dark:true},
  {key:'rose', label:'Rose', dark:false},
  {key:'mint', label:'Mint', dark:false},
  {key:'sunset', label:'Sunset', dark:false},
  {key:'storm', label:'Storm', dark:true},
  {key:'espresso', label:'Espresso', dark:true}
];

function applyTheme(themeKey){
  const known = THEME_LIST.some(t=>t.key===themeKey);
  const key = known ? themeKey : (themeKey==='dark' ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', key);
  SETTINGS.theme = key;
}
/* ============================================================
   APP ZOOM — scales the whole interface for different screens.
   Uses the CSS `zoom` property on the root element, which is
   exactly how the browser's own zoom works — so layout, fixed
   panels (cart, sidebar), and modals all scale together without
   breaking. Persisted in SETTINGS.appZoom.
   ============================================================ */
function applyZoom(value, skipSave){
  let v = parseInt(value, 10);
  if(isNaN(v)) v = 100;
  v = Math.max(50, Math.min(150, v));
  document.documentElement.style.zoom = (v / 100);
  document.documentElement.style.setProperty('--zf', v / 100);
  SETTINGS.appZoom = v;
  if(!skipSave) saveSettings();
  updateMediaLayoutMode(); // ← add this
  return v;
}

function updateMediaLayoutMode(){
  const w = window.innerWidth;
  document.body.classList.toggle('media-compact', w <= 860);
  document.body.classList.toggle('media-narrow', w > 860 && w <= 1180);
}

function seedProducts(){
  const seed = [
    { name:'Jasmine Rice 5kg', price:65, category:'Groceries', qty:24, image:'' },
    { name:'Cooking Oil 3L', price:48, category:'Groceries', qty:18, image:'' },
    { name:'Fresh Eggs (Crate)', price:42, category:'Fresh Produce', qty:15, image:'' },
    { name:'Milo 400g', price:29, category:'Beverages', qty:30, image:'' },
    { name:'Coca-Cola 500ml', price:6, category:'Beverages', qty:60, image:'' },
    { name:'Bread Loaf', price:12, category:'Bakery', qty:4, image:'' },
    { name:'Tomato Paste 400g', price:9, category:'Groceries', qty:40, image:'' },
    { name:'Detergent Powder 1kg', price:22, category:'Household', qty:3, image:'' },
    { name:'Toilet Roll (4pk)', price:14, category:'Household', qty:25, image:'' },
    { name:'Plantain (bunch)', price:18, category:'Fresh Produce', qty:0, image:'' },
  ];
  return seed.map(s => ({
    id: nextProductId(),
    ...s,
    dateAdded: new Date().toISOString()
  }));
}

function nextProductId(){
  const id = 'GTH-' + String(SETTINGS.nextProductSeq || 1).padStart(4,'0');
  SETTINGS.nextProductSeq = (SETTINGS.nextProductSeq || 1) + 1;
  return id;
}

/* Consumes `qty` units from a product's oldest batches first.
   Returns { batchesUsed:[{batchId,qty,price,costPrice}], totalCost, totalRevenue } or null if insufficient stock. */
function consumeStockFIFO(product, qty){
  if(!Array.isArray(product.batches)) product.batches = [];
  const available = product.batches.reduce((s,b)=>s+b.remainingQty,0);
  if(available < qty) return null;

  let remaining = qty;
  const batchesUsed = [];
  let totalCost = 0, totalRevenue = 0;

  // Oldest first — batches are appended in creation order, so sort by dateAdded to be safe
  const ordered = product.batches
    .filter(b=>b.remainingQty>0)
    .sort((a,b)=> new Date(a.dateAdded) - new Date(b.dateAdded));

  for(const batch of ordered){
    if(remaining<=0) break;
    const take = Math.min(batch.remainingQty, remaining);
    batch.remainingQty -= take;
    remaining -= take;
    batchesUsed.push({ batchId: batch.id, qty: take, price: batch.price, costPrice: batch.costPrice });
    totalRevenue += take * batch.price;
    if(batch.costPrice != null) totalCost += take * batch.costPrice;
  }
  // Drop fully-exhausted batches from the active list (keep them in history via SaleItem log instead)
  product.batches = product.batches.filter(b=>b.remainingQty>0);
  return { batchesUsed, totalCost, totalRevenue };
}

function addStockBatch(product, addedQty, price, costPrice){
  const batch = { id: uid('BAT-'), qty: addedQty, remainingQty: addedQty, price, costPrice: costPrice ?? null, dateAdded: new Date().toISOString() };
  product.batches.push(batch);
  return batch;
}

/* ---------------- UTILITIES ---------------- */
function fmtMoney(n){
  const v = Number(n)||0;
  return SETTINGS.currency + ' ' + v.toLocaleString('en-GH', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'}) + ' · ' +
         d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
}
function uid(prefix){
  return prefix + Date.now().toString(36).toUpperCase() + Math.floor(Math.random()*90+10);
}
function escapeHtml(str){
  if(str===undefined || str===null) return '';
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function debounce(fn, ms){
  let t; return (...args)=>{ clearTimeout(t); t=setTimeout(()=>fn(...args), ms); };
}
function downloadBlob(content, filename, type){
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function normalizePhone(phone){
  if(!phone) return '';
  let p = String(phone).trim().replace(/[^\d+]/g,'');
  if(p.startsWith('0')) p = '233' + p.slice(1); // Ghana default country code
  if(p.startsWith('+')) p = p.slice(1);
  return p;
}
function upsertCustomerFromPhone(name, phone){
  const trimmedPhone = (phone||'').trim();
  if(!trimmedPhone) return;
  const norm = normalizePhone(trimmedPhone);
  const existing = CUSTOMERS.find(c => c.phone && normalizePhone(c.phone) === norm);
  if(existing) return; // already saved — don't overwrite what's there
  CUSTOMERS.push({
    id: uid('CUS-'),
    name: (name||'').trim() || 'Customer',
    phone: trimmedPhone,
    location: '',
    notes: 'Added automatically from a sale',
    dateAdded: new Date().toISOString(),
    lastUpdated: new Date().toISOString()
  });
  saveCustomers();
}

/* ============================================================
   SUPABASE SYNC — OFFLINE-FIRST
   Local storage (localStorage) is always the source of truth.
   Sync is a best-effort background process: it pushes local
   changes up and pulls remote changes down, merging by
   "last updated wins". The app works fully with sync OFF/failed.
   ============================================================ */
let supabaseClient = null;
let syncInFlight = false;
let syncTimer = null;
const syncLog = []; // {time, message, ok}

function addSyncLog(message, ok){
  syncLog.unshift({ time: new Date().toISOString(), message, ok });
  if(syncLog.length > 30) syncLog.length = 30;
  renderSyncStatusIfVisible();
}

function isSyncConfigured(){
  return !!(SYNC.url && SYNC.anonKey);
}

function initSupabaseClient(){
  if(!isSyncConfigured()){ supabaseClient = null; return false; }
  if(typeof supabase === 'undefined'){ return false; }
  try{
    supabaseClient = supabase.createClient(SYNC.url, SYNC.anonKey);
    return true;
  }catch(e){
    supabaseClient = null;
    return false;
  }
}

/* ---- Row <-> local object mappers ---- */
function productToRow(p){
  return {
    id: p.id, name: p.name, price: p.price, category: p.category || 'Uncategorized',
    qty: p.qty, image: p.image || '', date_added: p.dateAdded || null,
    last_updated: p.lastUpdated || p.dateAdded || new Date().toISOString(),
    cost_price: p.costPrice ?? null,      // NEW
    batches: p.batches || [],             // NEW
    history: p.history || []              // NEW
  };
}
function rowToProduct(r){
  return {
    id: r.id, name: r.name, price: Number(r.price)||0, category: r.category || 'Uncategorized',
    qty: Number(r.qty)||0, image: r.image || '', dateAdded: r.date_added || r.last_updated,
    lastUpdated: r.last_updated,
    costPrice: r.cost_price ?? null,      // NEW
    batches: r.batches || [],             // NEW
    history: r.history || []              // NEW
  };
}
function customerToRow(c){
  return {
    id: c.id, name: c.name, phone: c.phone || '', location: c.location || '',
    notes: c.notes || '', date_added: c.dateAdded || null,
    last_updated: c.lastUpdated || c.dateAdded || new Date().toISOString()
  };
}
function rowToCustomer(r){
  return {
    id: r.id, name: r.name, phone: r.phone || '', location: r.location || '',
    notes: r.notes || '', dateAdded: r.date_added || r.last_updated, lastUpdated: r.last_updated
  };
}
function saleToRow(s){
  return {
    id: s.id, timestamp: s.timestamp, items: s.items, subtotal: s.subtotal, discount: s.discount,
    total: s.total, payment_method: s.paymentMethod, amount_tendered: s.amountTendered, change: s.change,
    customer_name: s.customerName, customer_phone: s.customerPhone || '', cashier_name: s.cashierName || '',
    last_updated: s.lastUpdated || s.timestamp
  };
}
function rowToSale(r){
  return {
    id: r.id, timestamp: r.timestamp, items: r.items || [], subtotal: Number(r.subtotal)||0,
    discount: Number(r.discount)||0, total: Number(r.total)||0, paymentMethod: r.payment_method,
    amountTendered: Number(r.amount_tendered)||0, change: Number(r.change)||0,
    customerName: r.customer_name || 'Walk-in customer', customerPhone: r.customer_phone || '',
    cashierName: r.cashier_name || '', lastUpdated: r.last_updated
  };
}

function setSyncStatus(state, text){
  const dot = document.getElementById('syncStatusDot');
  const label = document.getElementById('syncStatusText');
  if(dot){ dot.className = 'sync-status-dot' + (state==='ok'?' ok':state==='err'?' err':''); }
  if(label){ label.textContent = text; }
}

/* Push local changes up, then pull remote changes down, merging by lastUpdated. */
async function runSync(manual){
  if(syncInFlight) return;
  if(!isSyncConfigured()){
    if(manual) toast('Add your Supabase URL and anon key first (Settings > Sync)', 'error');
    return;
  }
  if(typeof navigator !== 'undefined' && navigator.onLine === false){
    if(manual) toast('You are offline — will sync automatically once back online', 'error');
    setSyncStatus('err', 'Offline — waiting to reconnect');
    return;
  }
  if(!initSupabaseClient()){
    if(manual) toast('Could not start Supabase client — check URL/key', 'error');
    setSyncStatus('err', 'Sync library not ready');
    return;
  }
  syncInFlight = true;
  setSyncStatus('', 'Syncing…');
  try{
    // 1) Push local upserts
    if(PRODUCTS.length){
      const { error } = await supabaseClient.from(SYNC.productsTable).upsert(PRODUCTS.map(productToRow), { onConflict: 'id' });
      if(error) throw error;
    }
    if(SALES.length){
      const { error } = await supabaseClient.from(SYNC.salesTable).upsert(SALES.map(saleToRow), { onConflict: 'id' });
      if(error) throw error;
    }
    if(CUSTOMERS.length){
      const { error } = await supabaseClient.from(SYNC.customersTable).upsert(CUSTOMERS.map(customerToRow), { onConflict: 'id' });
      if(error) throw error;
    }
    // 2) Push deletions
    if(DELETED_QUEUE.products.length){
      const { error } = await supabaseClient.from(SYNC.productsTable).delete().in('id', DELETED_QUEUE.products);
      if(error) throw error;
      DELETED_QUEUE.products = [];
    }
    if(DELETED_QUEUE.customers.length){
      const { error } = await supabaseClient.from(SYNC.customersTable).delete().in('id', DELETED_QUEUE.customers);
      if(error) throw error;
      DELETED_QUEUE.customers = [];
    }
    saveDeletedQueue();

    // 3) Pull remote and merge (last-updated wins; new remote rows are added)
    const [{ data: remoteProducts, error: pErr }, { data: remoteSales, error: sErr }, { data: remoteCustomers, error: cErr }] = await Promise.all([
      supabaseClient.from(SYNC.productsTable).select('*'),
      supabaseClient.from(SYNC.salesTable).select('*'),
      supabaseClient.from(SYNC.customersTable).select('*')
    ]);
    if(pErr) throw pErr; if(sErr) throw sErr; if(cErr) throw cErr;

    mergeRemote(PRODUCTS, remoteProducts || [], rowToProduct, r=>r.id, 'lastUpdated');
    mergeRemote(SALES, remoteSales || [], rowToSale, r=>r.id, 'lastUpdated');
    mergeRemote(CUSTOMERS, remoteCustomers || [], rowToCustomer, r=>r.id, 'lastUpdated');

    localStorage.setItem(K_PRODUCTS, JSON.stringify(PRODUCTS));
    localStorage.setItem(K_SALES, JSON.stringify(SALES));
    localStorage.setItem(K_CUSTOMERS, JSON.stringify(CUSTOMERS));

    SYNC.lastSync = new Date().toISOString();
    saveSync();
    setSyncStatus('ok', 'Synced ' + fmtDate(SYNC.lastSync));
    addSyncLog('Synced successfully', true);
    if(manual) toast('Sync complete', 'success');

    // Refresh the current screen if it shows any of this data
    if(['pos','dashboard','products','customers','history','reports'].includes(currentView)) switchView(currentView);
  }catch(err){
    console.error('Sync error', err);
    setSyncStatus('err', 'Sync failed — will retry');
    addSyncLog('Sync failed: ' + (err && err.message ? err.message : 'unknown error'), false);
    if(manual) toast('Sync failed: ' + (err && err.message ? err.message : 'check your connection/keys'), 'error');
  }finally{
    syncInFlight = false;
  }
}

function mergeRemote(localArr, remoteRows, rowMapper, idFn, tsField){
  const localById = new Map(localArr.map(x=>[x.id, x]));
  remoteRows.forEach(row=>{
    const mapped = rowMapper(row);
    const existing = localById.get(mapped.id);
    if(!existing){
      localArr.push(mapped);
      localById.set(mapped.id, mapped);
    } else {
      const localTime = new Date(existing[tsField] || 0).getTime();
      const remoteTime = new Date(mapped[tsField] || 0).getTime();
      if(remoteTime > localTime){
        Object.assign(existing, mapped);
      }
    }
  });
}

let syncDebounceTimer = null;
function scheduleSync(){
  if(!isSyncConfigured()) return;
  clearTimeout(syncDebounceTimer);
  syncDebounceTimer = setTimeout(()=>runSync(false), 4000);
}

function startAutoSyncLoop(){
  if(syncTimer) clearInterval(syncTimer);
  if(!SYNC.autoSync || !isSyncConfigured()) return;
  const seconds = Math.max(20, Number(SYNC.syncIntervalSec)||60);
  syncTimer = setInterval(()=>runSync(false), seconds*1000);
}

  list.innerHTML = syncLog.map(l=>`
    <div class="history-item">
      <div class="h-date">${fmtDate(l.time)}</div>
      <div style="color:${l.ok?'var(--success-dark)':'var(--danger-dark)'};">${escapeHtml(l.message)}</div>

  `).join('');
}

/* ---------------- TOASTS ---------------- */
function toast(msg, type='info', icon){
  const stack = document.getElementById('toast-stack');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  const icons = {success:'✓', error:'✕', info:'ℹ'};
  el.innerHTML = `<span class="t-ico">${icon || icons[type] || 'ℹ'}</span><span>${escapeHtml(msg)}</span>`;
  stack.appendChild(el);
  setTimeout(()=>{ el.classList.add('hide'); setTimeout(()=>el.remove(), 320); }, 2800);
}

let mediaNotifyTimer = null;
function showMediaNotify(kind, name){

function startClock(){
  const el = document.getElementById('clock');
  function tick(){
    const now = new Date();
    el.innerHTML = `<b>${now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}</b>${now.toLocaleDateString('en-GB',{weekday:'short', day:'2-digit', month:'short'})}`;
  }
  tick(); setInterval(tick, 30000);
}

    pos:'viewPos', dashboard:'viewDashboard', media:'viewMedia', products:'viewProducts', customers:'viewCustomers',

  if(view==='pos') renderPosView();
  if(view==='dashboard') renderDashboardView();
  if(view==='media') renderMediaView();
  if(view==='products') renderProductsView();
  if(view==='customers') renderCustomersView();

function helpFlow(steps){
  return `<div class="help-flow">${steps.map((s,i)=>
    `<div class="fbox">${escapeHtml(s)}</div>${i<steps.length-1?'<span class="farrow">→</span>':''}`
  ).join('')}</div>`;
}
function helpFlowSvg(steps){
  const boxW = 148, boxH = 46, gapX = 46, H = 90;
  const totalW = steps.length*boxW + (steps.length-1)*gapX;
  let x = 0;
  const boxes = steps.map((label,i)=>{
    const bx = x; x += boxW+gapX;
    const arrow = i<steps.length-1 ? `<path d="M${bx+boxW+6} ${H/2} L${bx+boxW+gapX-6} ${H/2}" stroke="var(--orange-dark)" stroke-width="2.5" marker-end="url(#helpArrow)"/>` : '';
    return `
      <rect x="${bx}" y="${(H-boxH)/2}" width="${boxW}" height="${boxH}" rx="10" fill="var(--card)" stroke="var(--border)" stroke-width="1.5"/>
      <text x="${bx+boxW/2}" y="${H/2+4}" text-anchor="middle" font-size="12" font-weight="700" fill="var(--text)" font-family="Inter, Arial, sans-serif">${escapeHtml(label)}</text>
      ${arrow}`;
  }).join('');
  return `<div style="overflow-x:auto;margin:14px 0;"><svg viewBox="0 0 ${totalW} ${H}" style="min-width:${totalW}px;height:${H}px;">
    <defs><marker id="helpArrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="var(--orange-dark)"/></marker></defs>
    ${boxes}
  </svg></div>`;
}

function updateTopBadges(){
  const cartCount = CART.reduce((s,c)=>s+c.qty,0);
  const cc = document.getElementById('cartTopCount');
  cc.textContent = cartCount;
  cc.classList.toggle('hidden', cartCount===0);

  if(nc){ nc.textContent = low.length; nc.classList.toggle('hidden', low.length===0); }
}

function productCardHtml(p, mode, i){

  const thumb = p.image ? `<img src="${p.image}" alt="${escapeHtml(p.name)}">` : `<span class="ph">${ICONS.box}</span>`;

  if(mode === 'titles'){
    return `
    <div class="product-card mode-titles" data-id="${p.id}">
      <div class="info">
        <div class="pname">${escapeHtml(p.name)}</div>
        <span class="stock-tag ${stockClass}">${stockLabel}</span>
        <div class="pprice">${fmtMoney(p.price)}</div>
      </div>
    </div>`;
  }
  if(mode === 'list'){
    return `
    <div class="product-card mode-list" data-id="${p.id}">
      <div class="thumb">${thumb}</div>
      <div class="info">
        <div>
          <div class="pname">${escapeHtml(p.name)}</div>
          <div class="pcat">${escapeHtml(p.category||'Uncategorized')}</div>
        </div>
        <div class="flex items-center gap-8">
          <span class="stock-tag ${stockClass}">${stockLabel}</span>
          <div class="pprice">${fmtMoney(p.price)}</div>
        </div>
      </div>
    </div>`;
  }
  if(mode === 'content'){
    return `
    <div class="product-card mode-content" data-id="${p.id}">
      <div class="thumb">${thumb}</div>
      <div class="info">
        <div>
          <div class="pname">${escapeHtml(p.name)}</div>
          <div class="pcat">${escapeHtml(p.category||'Uncategorized')} · ${p.id}</div>
        </div>
        <div style="text-align:right;">
          <div class="pprice">${fmtMoney(p.price)}</div>
          <span class="stock-tag ${stockClass}">${stockLabel}</span>

  // large & small share the same card shape; small gets a compact modifier class
  return `
    <div class="product-card ${mode==='small'?'mode-small':''}" data-id="${p.id}" style="animation-delay:${Math.min(i*0.02,0.3)}s">
      <div class="thumb">
        ${thumb}

      </div>

        <div class="pprice">${fmtMoney(p.price)}</div>
        <div class="pcat">${escapeHtml(p.category||'Uncategorized')}</div>

}

function renderProductGrid(){
  const grid = document.getElementById('productGrid');
  if(!grid) return;
  const mode = SETTINGS.productViewMode || 'large';
  grid.className = 'product-grid view-mode-' + mode;
  let list = PRODUCTS.slice();
  if(activeCategory !== 'All') list = list.filter(p => (p.category||'Uncategorized') === activeCategory);
  if(productSearchTerm){
    list = list.filter(p => p.name.toLowerCase().includes(productSearchTerm) || p.id.toLowerCase().includes(productSearchTerm));
  }
  if(!list.length){
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">
      <div class="ico">🔍</div><h3>No products found</h3><p>Try a different search or category.</p>
    </div>`;
    return;
  }
  grid.innerHTML = list.map((p,i)=>productCardHtml(p, mode, i)).join('');
  grid.querySelectorAll('.product-card').forEach(card=>{
    card.onclick = () => addToCart(card.dataset.id, card);
  });
}

/* ---------------- CART LOGIC ---------------- */
function addToCart(productId, cardEl){
  const p = PRODUCTS.find(x=>x.id===productId);
  if(!p) return;
  if(p.qty<=0){ toast('This product is out of stock', 'error'); return; }
  const line = CART.find(c=>c.productId===productId);
  const currentQty = line ? line.qty : 0;
  if(currentQty+1 > p.qty){ toast(`Only ${p.qty} left in stock`, 'error'); return; }
  if(line){ line.qty += 1; } else { CART.push({productId, qty:1}); }
  if(cardEl){ cardEl.classList.remove('flash'); void cardEl.offsetWidth; cardEl.classList.add('flash'); }
  renderCartPanel();
  updateTopBadges();
  // Auto-clear the product search bar once a product has been chosen
  if(productSearchTerm){
    setTimeout(()=>{
      productSearchTerm = '';
      const gs = document.getElementById('globalSearch');
      if(gs) gs.value = '';
      renderProductGrid();
    }, 650);
  }
}

function changeCartQty(productId, delta){
  const line = CART.find(c=>c.productId===productId);
  if(!line) return;
  const p = PRODUCTS.find(x=>x.id===productId);
  const newQty = line.qty + delta;
  if(newQty <= 0){ CART = CART.filter(c=>c.productId!==productId); }
  else if(p && newQty > p.qty){ toast(`Only ${p.qty} in stock`, 'error'); return; }
  else{ line.qty = newQty; }
  renderCartPanel();
  updateTopBadges();
}

function removeFromCart(productId){
  CART = CART.filter(c=>c.productId!==productId);
  renderCartPanel();
  updateTopBadges();
  toast('Item removed from cart', 'info');
}

function clearCart(){
  CART = [];
  renderCartPanel();
  updateTopBadges();
}

function refreshCart(){
  let adjusted = false;
  CART = CART.map(c=>{
    const p = PRODUCTS.find(x=>x.id===c.productId);
    if(!p || p.qty<=0){ adjusted = true; return null; }
    if(c.qty > p.qty){ c.qty = p.qty; adjusted = true; }
    return c;
  }).filter(Boolean);
  renderCartPanel();
  updateTopBadges();
  toast(adjusted ? 'Cart refreshed — quantities updated to match current stock' : 'Cart refreshed', 'info');
}

function cartLines(){
  return CART.map(c=>{
    const p = PRODUCTS.find(x=>x.id===c.productId);
    return p ? { ...c, product:p, lineTotal: p.price*c.qty } : null;
  }).filter(Boolean);
}

function cartSubtotal(){ return cartLines().reduce((s,l)=>s+l.lineTotal,0); }
